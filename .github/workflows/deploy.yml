name: Deploy Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # 6‑hour limit (free tier)

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run bot
      env:
        # 🔐 Secrets
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        STORAGE_TOKEN: ${{ secrets.STORAGE_TOKEN }}         # NEW – GitHub PAT for Storage repo

        # 📦 Variables
        GUILD_ID:               ${{ vars.GUILD_ID }}
        OWNER_ID:               ${{ vars.OWNER_ID }}

        STAFF_ROLE_ID:          ${{ vars.STAFF_ROLE_ID }}
        MANAGER_ROLE_ID:        ${{ vars.MANAGER_ROLE_ID }}
        MODERATOR_ROLE_ID:      ${{ vars.MODERATOR_ROLE_ID }}

        TICKET_CATEGORY_ID:     ${{ vars.TICKET_CATEGORY_ID }}
        REVIEW_CHANNEL_ID:      ${{ vars.REVIEW_CHANNEL_ID }}

        IDLE_WARN_MINUTES:      ${{ vars.IDLE_WARN_MINUTES }}
        IDLE_CLOSE_MINUTES:     ${{ vars.IDLE_CLOSE_MINUTES }}

        PORT:                   ${{ vars.PORT }}

        USE_AWS:                ${{ vars.USE_AWS }}
        AWS_REGION:             ${{ vars.AWS_REGION }}

        # Optional Storage overrides (uncomment if you want to use different repo/branch)
        # STORAGE_REPO:           ${{ vars.STORAGE_REPO }}
        # STORAGE_BRANCH:         ${{ vars.STORAGE_BRANCH }}

      run: python main.py
