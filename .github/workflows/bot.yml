name: Discord Bot
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Restarts every 6 hours to prevent timeout
  workflow_dispatch:      # Allows you to start it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # We will set this in Step 3
          GUILD_ID: ${{ secrets.GUILD_ID }}
        run: python main.py
