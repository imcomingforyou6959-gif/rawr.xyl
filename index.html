<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>rawrs.zapto.org | Performance Scripting Hub</title>
    <meta name="title" content="rawrs.zapto.org | Performance Scripting Hub">

    <meta name="keywords" content="rawr.xyz, rawrs.zapto.org, Roblox Scripts, B4NEX, Lua Scripts, Script Hub, Roblox Executor, Xeno, Velocity, Solara, Wave, Sirhurt">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rawrs.zapto.org/">
    <meta property="og:title" content="rawrs.zapto.org — Official Hub">
    <meta property="og:description" content="Experience high-performance execution. Optimized for Xeno, Velocity, Solara, and more. Access the official repository and community.">
    <meta property="og:image" content="https://rawrs.zapto.org/logo.png">
    <meta property="og:image:alt" content="rawr.xyz Official Logo">
    <meta name="theme-color" content="#ef4444">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://rawrs.zapto.org/">
    <meta property="twitter:title" content="rawrs.zapto.org — Official Hub">
    <meta property="twitter:description" content="Amazing Execution Time and regular updates.">
    <meta property="twitter:image" content="https://rawrs.zapto.org/logo.png">

    <script defer src="https://cloud.umami.is/script.js" data-website-id="dabf5da2-bbe9-4bae-9f67-8bf0c0686daf"></script>

    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        body { background-color: #050505; color: white; margin: 0; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .rain-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; opacity: 0.12; }
        .scanline { width: 100%; height: 3px; background: linear-gradient(to bottom, transparent, rgba(239, 68, 68, 0.08), transparent); position: fixed; z-index: 5; top: 0; animation: scan 6s linear infinite; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        .logo-glow { filter: drop-shadow(0 0 25px rgba(239, 68, 68, 0.3)); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    const CompatibilityBar = () => {
        const executors = ["Xeno", "Velocity", "Solara", "Wave", "Sirhurt"];
        return (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.8 }} className="mt-8 w-full max-w-lg px-4">
                <div className="flex items-center gap-4 mb-4">
                    <div className="h-[1px] flex-1 bg-white/5"></div>
                    <span className="text-[9px] font-mono text-white/20 tracking-[0.4em] uppercase font-bold">Verified Compatibility</span>
                    <div className="h-[1px] flex-1 bg-white/5"></div>
                </div>
                <div className="flex flex-wrap justify-center gap-x-8 gap-y-4">
                    {executors.map((name) => (
                        <div key={name} className="flex items-center gap-2 group cursor-default">
                            <div className="w-1.5 h-1.5 rounded-full bg-primary/20 group-hover:bg-primary group-hover:shadow-[0_0_10px_#ef4444] transition-all duration-300"></div>
                            <span className="text-[11px] font-mono font-black text-white/40 group-hover:text-white transition-colors tracking-tighter uppercase">{name}</span>
                        </div>
                    ))}
                    <span className="text-[10px] font-mono text-white/10 italic self-center">& more</span>
                </div>
            </motion.div>
        );
    };

    function ScriptBlock() {
        const [copied, setCopied] = React.useState(false);
        const [config, setConfig] = React.useState({ version: "LOADING...", status: "CHECKING...", statusColor: "gray" });
        const scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyz/refs/heads/main/.exe"))()`;

        React.useEffect(() => {
            const jsonUrl = `https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyl/refs/heads/main/status.json?t=${new Date().getTime()}`;
            fetch(jsonUrl)
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(data => setConfig(data))
                .catch(() => setConfig({ version: "v1.7.2", status: "ONLINE", statusColor: "green" }));
        }, []);

        const handleCopy = async () => {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(scriptText);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = scriptText;
                    textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                    document.body.appendChild(textArea);
                    textArea.focus(); textArea.select();
                    document.execCommand('copy');
                    textArea.remove();
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            } catch (err) { console.error('Copy failed', err); }
        };

        const dotColor = config.statusColor === "green" ? "bg-green-500" : config.statusColor === "red" ? "bg-red-500" : "bg-yellow-500";
        const textColor = config.statusColor === "green" ? "text-green-500/80" : config.statusColor === "red" ? "text-red-500/80" : "text-yellow-500/80";

        return (
            <div className="flex flex-col items-center w-full">
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="relative w-full max-w-lg bg-black/60 border border-white/10 rounded-2xl overflow-hidden backdrop-blur-md shadow-2xl mt-8">
                    <div className="flex items-center justify-between px-5 py-4 bg-white/5 border-b border-white/10">
                        <div className="flex items-center gap-4">
                            <div className="flex gap-1.5">
                                <div className="w-2.5 h-2.5 rounded-full bg-[#ff5f56]"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-[#ffbd2e]"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-[#27c93f]"></div>
                            </div>
                            <span className="text-[10px] font-mono text-white/30 bg-white/5 px-2 py-0.5 rounded border border-white/5 uppercase tracking-tighter">{config.version}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="relative flex h-2 w-2">
                                <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${dotColor}`}></span>
                                <span className={`relative inline-flex rounded-full h-2 w-2 ${dotColor}`}></span>
                            </span>
                            <span className={`text-[10px] font-mono uppercase tracking-widest font-bold ${textColor}`}>{config.status}</span>
                        </div>
                    </div>
                    <div className="p-8">
                        <div className="bg-black/40 rounded-xl p-5 mb-6 border border-white/5 group hover:border-primary/20 transition-all">
                            <code className="block font-mono text-[10px] md:text-xs text-primary/90 break-all leading-relaxed uppercase">
                                <span className="text-white/20 mr-2 select-none">$</span>{scriptText}
                            </code>
                        </div>
                        <button onClick={handleCopy} className="relative w-full py-5 rounded-xl font-mono text-[10px] font-bold transition-all border border-primary/30 bg-primary/5 hover:bg-primary/20 text-white tracking-widest overflow-hidden active:scale-95">
                            <AnimatePresence mode="wait">
                                {copied ? (
                                    <motion.div key="suc" initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: -20, opacity: 0 }} className="absolute inset-0 flex items-center justify-center bg-primary text-white">SUCCESS! COPIED TO CLIPBOARD</motion.div>
                                ) : (
                                    <motion.span key="lab" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>CLICK TO COPY SCRIPT</motion.span>
                                )}
                            </AnimatePresence>
                        </button>
                    </div>
                </motion.div>
                <CompatibilityBar />
            </div>
        );
    }

    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];
            const init = () => {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                drops = Array.from({ length: 60 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, len: Math.random() * 20 + 10, vel: Math.random() * 12 + 6 }));
            };
            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1;
                drops.forEach(d => {
                    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len); ctx.stroke();
                    d.y += d.vel; if (d.y > canvas.height) d.y = -30;
                });
                requestAnimationFrame(draw);
            };
            init(); draw();
            window.addEventListener('resize', init);
            return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    const LinkButton = ({ href, iconClass, label }) => (
        <a href={href} target="_blank" className="flex items-center gap-4 px-8 py-4 bg-white/[0.02] border border-white/5 rounded-2xl hover:bg-white/[0.06] hover:border-primary/40 transition-all group backdrop-blur-sm">
            <i className={`${iconClass} text-white/30 group-hover:text-primary transition-colors text-xl`}></i>
            <span className="font-bold text-[13px] tracking-tight text-white/60 group-hover:text-white transition-colors">{label}</span>
        </a>
    );

    function Home() {
        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-8 py-20">
                <RainBackground />
                <div className="scanline" />
                <div className="fixed inset-0 bg-gradient-to-tr from-background via-transparent to-primary/5 z-10 pointer-events-none" />
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1.2 }} className="relative z-20 flex flex-col items-center w-full max-w-2xl">
                    <motion.img src="logo.png" animate={{ y: [0, -10, 0] }} transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }} className="w-40 h-40 md:w-48 md:h-48 object-contain mb-12 logo-glow" alt="rawr logo" />
                    <div className="text-center mb-14">
                        <motion.h1 className="text-6xl md:text-8xl font-black font-mono text-white uppercase italic">rawr<span className="text-primary tracking-normal">.xyz</span></motion.h1>
                        <div className="mt-4 h-[2px] w-24 bg-gradient-to-r from-transparent via-primary to-transparent mx-auto opacity-50" />
                    </div>
                    <div className="flex flex-wrap justify-center gap-4">
                        <LinkButton href="https://discord.com/invite/eMpUQzFrNG" iconClass="fa-brands fa-discord" label="Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" iconClass="fa-brands fa-github" label="GitHub" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" iconClass="fa-brands fa-youtube" label="YouTube" />
                    </div>
                    <ScriptBlock />
                </motion.div>
                <footer className="mt-20 z-20 text-[10px] font-mono text-white/10 tracking-[0.8em] uppercase text-center select-none">rawr.xyz V1.5.1 // Made with passion</footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
