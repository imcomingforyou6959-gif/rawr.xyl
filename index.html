<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <title>rawr.xyz</title>
    <meta name="description" content="The official repository for rawr.xyz. Safe. Fast. Reliable.">
    <meta name="theme-color" content="#ef4444">

    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
        body {
            background-color: #050505;
            color: white;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        .rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.12;
        }
        .scanline {
            width: 100%;
            height: 3px;
            background: linear-gradient(to bottom, transparent, rgba(239, 68, 68, 0.08), transparent);
            position: fixed;
            z-index: 5;
            top: 0;
            animation: scan 6s linear infinite;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        .logo-glow { filter: drop-shadow(0 0 25px rgba(239, 68, 68, 0.3)); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: black;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            border: 2px solid #050505;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: statusPulse 2s infinite;
        }
        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }
        .status-dot.disconnected { background: #ef4444; }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        input:focus { outline: none; }
        @media (max-width: 640px) {
            .rain-canvas { opacity: 0.05; }
            .logo-glow { filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.2)); }
        }
        html { overflow-y: scroll; }
        body, button, input {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .chat-toggle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            font-size: 24px;
        }
        @media (max-width: 640px) {
            .chat-toggle-btn {
                width: 56px;
                height: 56px;
                font-size: 20px;
            }
        }
        .footer-link {
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .footer-link:hover { color: #ef4444; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // --- CONFIGURATION ---
    const CONFIG = {
        WEBSOCKET_URL: typeof window !== 'undefined' && window.location.hostname === 'localhost' 
            ? 'ws://localhost:8765'
            : 'wss://rawrs.zapto.org/ws',
        MESSAGE_HISTORY_SIZE: 50,
        MAX_MESSAGE_LENGTH: 500,
        STORAGE_KEY_PREFIX: 'rawr_chat_',
        CLEANUP_INTERVAL: 3600000,
    };

    const generateMessageId = () => `msg_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

    // --- STORAGE MANAGER ---
    class StorageManager {
        static getMessages() {
            try {
                const key = CONFIG.STORAGE_KEY_PREFIX + 'messages';
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.warn('Failed to load messages:', e);
                return [];
            }
        }
        static setMessages(messages) {
            try {
                const key = CONFIG.STORAGE_KEY_PREFIX + 'messages';
                const trimmed = messages.slice(-CONFIG.MESSAGE_HISTORY_SIZE);
                localStorage.setItem(key, JSON.stringify(trimmed));
            } catch (e) {
                console.warn('Failed to save messages:', e);
            }
        }
        static getUserId() {
            try {
                const key = CONFIG.STORAGE_KEY_PREFIX + 'user_id';
                let userId = localStorage.getItem(key);
                if (!userId) {
                    userId = 'User_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem(key, userId);
                }
                return userId;
            } catch (e) {
                return 'User_' + Math.random().toString(36).substr(2, 9);
            }
        }
        static cleanup() {
            try {
                const key = CONFIG.STORAGE_KEY_PREFIX + 'messages';
                const data = localStorage.getItem(key);
                if (data) {
                    const messages = JSON.parse(data);
                    const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                    const filtered = messages.filter(m => m.timestamp > sevenDaysAgo);
                    localStorage.setItem(key, JSON.stringify(filtered));
                }
            } catch (e) {
                console.warn('Storage cleanup failed:', e);
            }
        }
    }

    // --- WEBSOCKET MANAGER ---
    class WebSocketManager {
        constructor(onMessage) {
            this.ws = null;
            this.onMessage = onMessage;
            this.isConnected = false;
            this.reconnectAttempts = 0;
            this.maxReconnectAttempts = 5;
            this.reconnectDelay = 3000;
            this.messageQueue = [];
            this.isReady = false;
        }
        async connect() {
            try {
                this.ws = new WebSocket(CONFIG.WEBSOCKET_URL);
                this.ws.onopen = () => {
                    console.log('WebSocket connected');
                    this.isConnected = true;
                    this.isReady = true;
                    this.reconnectAttempts = 0;
                    while (this.messageQueue.length > 0) {
                        const msg = this.messageQueue.shift();
                        this.send(msg);
                    }
                };
                this.ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        this.onMessage(data);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };
                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.isConnected = false;
                };
                this.ws.onclose = () => {
                    console.log('WebSocket closed');
                    this.isConnected = false;
                    this.isReady = false;
                    this.attemptReconnect();
                };
            } catch (error) {
                console.error('Failed to connect WebSocket:', error);
                this.isConnected = false;
                this.isReady = false;
                this.attemptReconnect();
            }
        }
        attemptReconnect() {
            if (this.reconnectAttempts < this.maxReconnectAttempts) {
                this.reconnectAttempts++;
                const delay = this.reconnectDelay * Math.pow(1.5, this.reconnectAttempts - 1);
                console.log(`Reconnecting in ${delay}ms...`);
                setTimeout(() => this.connect(), Math.min(delay, 30000));
            }
        }
        send(message) {
            if (!this.isConnected || !this.ws || this.ws.readyState !== WebSocket.OPEN) {
                if (this.reconnectAttempts < this.maxReconnectAttempts) {
                    this.messageQueue.push(message);
                    return true;
                }
                return false;
            }
            try {
                this.ws.send(JSON.stringify(message));
                return true;
            } catch (error) {
                console.error('Failed to send message:', error);
                return false;
            }
        }
        close() {
            if (this.ws) { this.ws.close(); }
            this.isConnected = false;
        }
    }

    // 67
    const LiveChat = () => {
        const [isOpen, setIsOpen] = React.useState(false);
        const [messages, setMessages] = React.useState([]);
        const [input, setInput] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);
        const [unreadCount, setUnreadCount] = React.useState(0);
        const [isConnected, setIsConnected] = React.useState(false);
        const [connectionStatus, setConnectionStatus] = React.useState('Connecting...');
        const [staffReplying, setStaffReplying] = React.useState(false);
        const [error, setError] = React.useState(null);
        
        const scrollRef = React.useRef(null);
        const wsManagerRef = React.useRef(null);
        const currentUserRef = React.useRef(StorageManager.getUserId());
        const processedIdsRef = React.useRef(new Set());

        React.useEffect(() => {
            const saved = StorageManager.getMessages();
            setMessages(saved);
            wsManagerRef.current = new WebSocketManager((data) => handleWebSocketMessage(data));
            wsManagerRef.current.connect();
            const cleanupInterval = setInterval(() => StorageManager.cleanup(), CONFIG.CLEANUP_INTERVAL);
            return () => {
                clearInterval(cleanupInterval);
                if (wsManagerRef.current) { wsManagerRef.current.close(); }
            };
        }, []);

        const handleWebSocketMessage = (data) => {
            const msgId = data.id;
            if (msgId && processedIdsRef.current.has(msgId)) return;
            if (msgId) processedIdsRef.current.add(msgId);
            if (data.type === 'chat' && data.origin === 'web') {
                addMessage({ user: data.user, text: data.text, timestamp: data.timestamp || Date.now(), origin: 'web', id: msgId || generateMessageId() });
            } else if (data.type === 'reply') {
                addMessage({ user: data.user, text: data.text, timestamp: data.timestamp || Date.now(), origin: 'discord', id: msgId || generateMessageId() });
                setStaffReplying(false);
            } else if (data.type === 'typing') {
                if (data.origin === 'discord') setStaffReplying(true);
            }
            updateConnectionStatus();
        };

        const updateConnectionStatus = () => {
            if (wsManagerRef.current?.isConnected) {
                setIsConnected(true);
                setConnectionStatus('Connected');
                setError(null);
            } else {
                setIsConnected(false);
                setConnectionStatus('Reconnecting...');
            }
        };

        const addMessage = (msg) => {
            setMessages(prev => {
                if (prev.some(m => m.id === msg.id)) return prev;
                const newMessages = [...prev, msg].slice(-CONFIG.MESSAGE_HISTORY_SIZE);
                StorageManager.setMessages(newMessages);
                if (!isOpen && msg.origin === 'discord') setUnreadCount(count => count + 1);
                return newMessages;
            });
        };

        React.useEffect(() => {
            if (scrollRef.current && isOpen) {
                setTimeout(() => scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' }), 0);
            }
        }, [messages, isOpen]);

        React.useEffect(() => { if (isOpen) setUnreadCount(0); }, [isOpen]);

        React.useEffect(() => {
            const checkConnection = setInterval(() => updateConnectionStatus(), 2000);
            return () => clearInterval(checkConnection);
        }, []);

        const sendMessage = async () => {
            if (!input.trim()) return;
            if (!isConnected) { setError('Not connected. Please try again.'); return; }
            const messageText = input.trim().slice(0, CONFIG.MAX_MESSAGE_LENGTH);
            const messageId = generateMessageId();
            const message = { type: 'chat', user: currentUserRef.current, text: messageText, timestamp: Date.now(), origin: 'web', id: messageId };
            setIsLoading(true);
            setInput("");
            setError(null);
            addMessage(message);
            const sent = wsManagerRef.current.send(message);
            if (!sent) { setError('Failed to send. Retrying...'); setInput(messageText); }
            setIsLoading(false);
        };

        const formatTime = (timestamp) => new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const formatDate = (timestamp) => new Date(timestamp).toLocaleDateString([], { month: 'short', day: 'numeric' });
        const shouldShowDateSeparator = (current, previous) => {
            if (!previous) return true;
            return new Date(current.timestamp).toDateString() !== new Date(previous.timestamp).toDateString();
        };

        return (
            <>
                <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} transition={{ delay: 1.5 }} className="fixed bottom-6 right-6 z-[99] sm:bottom-8 sm:right-8">
                    <motion.button whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.95 }} onClick={() => setIsOpen(!isOpen)} className="chat-toggle-btn bg-primary hover:bg-primary/90 text-black shadow-xl transition-all relative">
                        <i className={`fas fa-${isOpen ? 'times' : 'headset'}`}></i>
                        {unreadCount > 0 && !isOpen && (
                            <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className="notification-badge">
                                {unreadCount > 9 ? '9+' : unreadCount}
                            </motion.div>
                        )}
                    </motion.button>
                </motion.div>

                <AnimatePresence>
                    {isOpen && (
                        <motion.div initial={{ opacity: 0, y: 20, scale: 0.9 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 20, scale: 0.9 }} transition={{ type: "spring", damping: 20, stiffness: 300 }} className="fixed bottom-24 right-6 z-[98] w-96 sm:bottom-32 sm:right-8 font-mono hidden sm:block">
                            <div className="bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl overflow-hidden backdrop-blur-xl h-96 flex flex-col">
                                <div className="bg-primary p-4 flex justify-between items-center flex-shrink-0">
                                    <div className="flex items-center gap-2">
                                        <div className={`status-dot ${isConnected ? 'connected' : 'disconnected'}`}></div>
                                        <span className="text-[10px] font-black tracking-widest text-black uppercase">{connectionStatus}</span>
                                    </div>
                                    <i className="fas fa-headset text-black text-xs"></i>
                                </div>
                                <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-black/95">
                                    {messages.length === 0 ? (
                                        <div className="text-center text-white/20 py-12 flex flex-col items-center justify-center h-full">
                                            <i className="fas fa-comments text-3xl mb-3"></i>
                                            <p className="text-[10px]">No messages yet</p>
                                            <p className="text-[9px] mt-1">Start a conversation</p>
                                        </div>
                                    ) : (
                                        <>
                                            {messages.map((msg, i) => {
                                                const isWeb = msg.origin === 'web';
                                                const isCurrentUser = msg.user === currentUserRef.current;
                                                const previous = i > 0 ? messages[i - 1] : null;
                                                const showDate = shouldShowDateSeparator(msg, previous);
                                                return (
                                                    <React.Fragment key={msg.id || i}>
                                                        {showDate && (
                                                            <div className="flex items-center gap-3 my-2">
                                                                <div className="h-[1px] flex-1 bg-white/5"></div>
                                                                <span className="text-[8px] text-white/20">{formatDate(msg.timestamp)}</span>
                                                                <div className="h-[1px] flex-1 bg-white/5"></div>
                                                            </div>
                                                        )}
                                                        <motion.div initial={{ opacity: 0, x: isWeb ? 20 : -20 }} animate={{ opacity: 1, x: 0 }} className={`${isWeb ? 'ml-auto text-right' : 'mr-auto text-left'} max-w-[80%]`}>
                                                            <div className="flex items-center gap-1 mb-1 text-[8px]">
                                                                <span className="text-white/30 uppercase tracking-wider font-bold">{isCurrentUser ? 'You' : (isWeb ? msg.user : `Staff: ${msg.user}`)}</span>
                                                                <span className="text-white/20 ml-auto">{formatTime(msg.timestamp)}</span>
                                                            </div>
                                                            <div className={`${isWeb ? 'bg-primary/20 text-primary border-primary/40' : 'bg-white/10 text-white border-white/20'} px-3 py-2 rounded-xl border text-[11px] leading-relaxed break-words`}>
                                                                {msg.text}
                                                            </div>
                                                        </motion.div>
                                                    </React.Fragment>
                                                );
                                            })}
                                            {staffReplying && (
                                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="mr-auto">
                                                    <div className="typing-indicator"><span></span><span></span><span></span></div>
                                                </motion.div>
                                            )}
                                        </>
                                    )}
                                </div>
                                {error && (
                                    <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="px-4 py-2 bg-red-500/20 border-t border-red-500/40 text-red-400 text-[8px]">
                                        <i className="fas fa-exclamation-circle mr-2"></i> {error}
                                    </motion.div>
                                )}
                                <div className="border-t border-white/10 bg-black/50 p-4 flex-shrink-0">
                                    <div className="flex gap-2 mb-2">
                                        <input value={input} onChange={(e) => setInput(e.target.value.slice(0, CONFIG.MAX_MESSAGE_LENGTH))} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey && !isLoading && isConnected) { e.preventDefault(); sendMessage(); } }} disabled={!isConnected || isLoading} type="text" placeholder={isConnected ? "Type a message..." : "Connecting..."} className="bg-white/5 border border-white/10 flex-1 px-3 py-2 text-[11px] focus:border-primary/50 rounded-lg text-white placeholder:text-white/20 disabled:opacity-50" maxLength={CONFIG.MAX_MESSAGE_LENGTH} />
                                        <motion.button whileHover={{ scale: isConnected && !isLoading ? 1.05 : 1 }} whileTap={{ scale: isConnected && !isLoading ? 0.95 : 1 }} onClick={sendMessage} disabled={!input.trim() || !isConnected || isLoading} className="bg-primary/20 hover:bg-primary text-primary hover:text-black disabled:opacity-50 w-10 h-10 rounded-lg flex items-center justify-center border border-primary/30 font-bold">
                                            {isLoading ? <i className="fas fa-spinner text-[11px] animate-spin"></i> : <i className="fas fa-paper-plane text-[11px]"></i>}
                                        </motion.button>
                                    </div>
                                    <div className="text-[8px] text-white/20 text-center">
                                        <i className="fas fa-shield-alt text-[6px] mr-1"></i>
                                        Encrypted • Minutes response
                                    </div>
                                </div>
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>

                {/* MC */}
                <AnimatePresence>
                    {isOpen && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[98] bg-black/95 sm:hidden flex flex-col">
                            <div className="bg-primary p-4 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <div className={`status-dot ${isConnected ? 'connected' : 'disconnected'}`}></div>
                                    <span className="text-[10px] font-black tracking-widest text-black uppercase">{connectionStatus}</span>
                                </div>
                                <motion.button onClick={() => setIsOpen(false)} className="text-black text-2xl">
                                    <i className="fas fa-times"></i>
                                </motion.button>
                            </div>
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                {/* ... same content as desktop ... */}
                                {messages.length === 0 ? (
                                    <div className="text-center text-white/20 py-12 flex flex-col items-center justify-center h-full">
                                        <i className="fas fa-comments text-4xl mb-4"></i>
                                        <p className="text-[12px]">No messages yet</p>
                                        <p className="text-[10px] mt-2">Start a conversation with support</p>
                                    </div>
                                ) : (
                                    <>
                                        {messages.map((msg, i) => {
                                            const isWeb = msg.origin === 'web';
                                            const isCurrentUser = msg.user === currentUserRef.current;
                                            const previous = i > 0 ? messages[i - 1] : null;
                                            const showDate = shouldShowDateSeparator(msg, previous);
                                            return (
                                                <React.Fragment key={msg.id || i}>
                                                    {showDate && (
                                                        <div className="flex items-center gap-3 my-3">
                                                            <div className="h-[1px] flex-1 bg-white/5"></div>
                                                            <span className="text-[9px] text-white/20">{formatDate(msg.timestamp)}</span>
                                                            <div className="h-[1px] flex-1 bg-white/5"></div>
                                                        </div>
                                                    )}
                                                    <motion.div initial={{ opacity: 0, x: isWeb ? 20 : -20 }} animate={{ opacity: 1, x: 0 }} className={`${isWeb ? 'ml-auto text-right' : 'mr-auto text-left'} max-w-[90%]`}>
                                                        <div className="flex items-center gap-1 mb-1 text-[9px]">
                                                            <span className="text-white/30 uppercase tracking-wider font-bold">{isCurrentUser ? 'You' : (isWeb ? msg.user : `Staff: ${msg.user}`)}</span>
                                                            <span className="text-white/20 ml-auto">{formatTime(msg.timestamp)}</span>
                                                        </div>
                                                        <div className={`${isWeb ? 'bg-primary/20 text-primary border-primary/40' : 'bg-white/10 text-white border-white/20'} px-4 py-2 rounded-xl border text-[12px] leading-relaxed break-words`}>
                                                            {msg.text}
                                                        </div>
                                                    </motion.div>
                                                </React.Fragment>
                                            );
                                        })}
                                        {staffReplying && (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="mr-auto">
                                                <div className="typing-indicator"><span></span><span></span><span></span></div>
                                            </motion.div>
                                        )}
                                    </>
                                )}
                            </div>
                            {error && (
                                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="px-4 py-3 bg-red-500/20 border-t border-red-500/40 text-red-400 text-[9px]">
                                    <i className="fas fa-exclamation-circle mr-2"></i> {error}
                                </motion.div>
                            )}
                            <div className="border-t border-white/10 bg-black/50 p-4">
                                <div className="flex gap-2 mb-2">

    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        const animationRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let drops = [];
            let width = window.innerWidth;
            let height = window.innerHeight;
            const init = () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                const isMobile = width < 640;
                const dropCount = isMobile ? Math.min(30, Math.floor(width / 50)) : Math.min(80, Math.floor(width / 30));
                drops = Array.from({ length: dropCount }, () => ({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    len: Math.random() * 20 + 10,
                    vel: Math.random() * 8 + 4
                }));
            };
            const draw = () => {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.3;
                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + d.len);
                    ctx.stroke();
                    d.y += d.vel;
                    if (d.y > height) { d.y = -20; d.x = Math.random() * width; }
                });
                animationRef.current = requestAnimationFrame(draw);
            };
            init();
            draw();
            window.addEventListener('resize', init);
            return () => {
                window.removeEventListener('resize', init);
                if (animationRef.current) cancelAnimationFrame(animationRef.current);
            };
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
