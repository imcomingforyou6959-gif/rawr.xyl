<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | OG</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Inter', sans-serif; 
        }

        .rain-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
            z-index: 1; 
            opacity: 0.12; 
        }

        .scanline { 
            width: 100%; 
            height: 3px; 
            background: linear-gradient(to bottom, transparent, rgba(239, 68, 68, 0.08), transparent); 
            position: fixed; 
            z-index: 5; 
            top: 0; 
            animation: scan 6s linear infinite; 
        }

        @keyframes scan { 
            0% { top: -10%; } 
            100% { top: 110%; } 
        }

        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(239, 68, 68, 0.3));
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // --- SCRIPTBLOCK COMPONENT ---
    function ScriptBlock() {
        const [copied, setCopied] = React.useState(false);
        const [config, setConfig] = React.useState({
            version: "V1.0.0",
            status: "CHECKING...",
            statusColor: "gray"
        });

        const scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyz/refs/heads/main/.exe"))()`;

        React.useEffect(() => {
            const jsonUrl = `https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyl/refs/heads/main/status.json?t=${new Date().getTime()}`;
            fetch(jsonUrl)
                .then(response => response.json())
                .then(data => setConfig(data))
                .catch(err => {
                    setConfig({ version: "v1.7.2", status: "ONLINE", statusColor: "green" });
                });
        }, []);

        const handleCopy = async () => {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(scriptText);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = scriptText;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    textArea.remove();
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            } catch (err) { console.error('Copy failed', err); }
        };

        const dotColorClass = config.statusColor === "green" ? "bg-green-500" : config.statusColor === "red" ? "bg-red-500" : "bg-yellow-500";
        const textColorClass = config.statusColor === "green" ? "text-green-500" : config.statusColor === "red" ? "text-red-500" : "text-yellow-500";

        return (
            <motion.div 
                initial={{ opacity: 0, y: 10 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ delay: 0.5 }}
                className="relative w-full max-w-lg bg-black/40 border border-white/5 rounded-2xl overflow-hidden backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] mt-12"
            >
                <div className="flex items-center justify-between px-5 py-4 bg-white/5 border-b border-white/5">
                    <div className="flex items-center gap-4">
                        <div className="flex gap-2">
                            <div className="w-3 h-3 rounded-full bg-[#ff5f56] opacity-80"></div>
                            <div className="w-3 h-3 rounded-full bg-[#ffbd2e] opacity-80"></div>
                            <div className="w-3 h-3 rounded-full bg-[#27c93f] opacity-80"></div>
                        </div>
                        <span className="text-[10px] font-mono text-white/40 tracking-widest uppercase">{config.version}</span>
                    </div>
                    <div className="flex items-center gap-2.5">
                        <span className="relative flex h-2.5 w-2.5">
                            <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-40 ${dotColorClass}`}></span>
                            <span className={`relative inline-flex rounded-full h-2.5 w-2.5 ${dotColorClass}`}></span>
                        </span>
                        <span className={`text-[10px] font-mono uppercase tracking-[0.2em] font-black ${textColorClass}`}>{config.status}</span>
                    </div>
                </div>
                <div className="p-7">
                    <div className="bg-black/60 rounded-xl p-5 mb-5 border border-white/5 group">
                        <code className="block font-mono text-[11px] md:text-sm text-primary/80 break-all leading-relaxed">
                            <span className="text-white/10 mr-3 select-none">#</span>{scriptText}
                        </code>
                    </div>
                    <button onClick={handleCopy} className="relative w-full py-5 rounded-xl font-mono text-[11px] font-black transition-all border border-primary/20 bg-primary/5 hover:bg-primary/10 hover:border-primary/50 text-white tracking-[0.3em] overflow-hidden active:scale-[0.98]">
                        <AnimatePresence mode="wait">
                            {copied ? (
                                <motion.div key="suc" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 flex items-center justify-center bg-primary text-white">COPIED TO CLIPBOARD</motion.div>
                            ) : (
                                <motion.span key="lab" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>COPY SCRIPT</motion.span>
                            )}
                        </AnimatePresence>
                    </button>
                </div>
            </motion.div>
        );
    }

    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];
            const init = () => {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                drops = Array.from({ length: 70 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, len: Math.random() * 20 + 10, vel: Math.random() * 10 + 5 }));
            };
            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1;
                drops.forEach(d => {
                    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len); ctx.stroke();
                    d.y += d.vel; if (d.y > canvas.height) d.y = -30;
                });
                requestAnimationFrame(draw);
            };
            init(); draw();
            window.addEventListener('resize', init);
            return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    const LinkButton = ({ href, iconName, label }) => {
        React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
        return (
            <a href={href} target="_blank" className="flex items-center gap-4 px-7 py-4 bg-white/[0.02] border border-white/5 rounded-2xl hover:bg-white/[0.06] hover:border-primary/40 transition-all group backdrop-blur-sm">
                <i data-lucide={iconName} className="w-5 h-5 text-white/30 group-hover:text-primary transition-colors"></i>
                <span className="font-bold text-[13px] tracking-tight text-white/60 group-hover:text-white transition-colors">{label}</span>
            </a>
        );
    };

    function Home() {
        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-8 py-20">
                <RainBackground />
                <div className="scanline" />
                <div className="fixed inset-0 bg-gradient-to-tr from-background via-transparent to-primary/5 z-10 pointer-events-none" />

                <motion.div 
                    initial={{ opacity: 0 }} 
                    animate={{ opacity: 1 }} 
                    transition={{ duration: 1.2 }} 
                    className="relative z-20 flex flex-col items-center w-full max-w-2xl"
                >
                    {/* Bigger, Transparent Logo with Glow & Floating Animation */}
                    <motion.img 
                        src="logo.png" 
                        animate={{ y: [0, -10, 0] }}
                        transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }}
                        className="w-40 h-40 md:w-48 md:h-48 object-contain mb-12 logo-glow" 
                        alt="logo" 
                    />
                    
                    <div className="text-center mb-14">
                        <motion.h1 
                            initial={{ letterSpacing: "0.2em", opacity: 0 }}
                            animate={{ letterSpacing: "-0.05em", opacity: 1 }}
                            transition={{ duration: 1, ease: "easeOut" }}
                            className="text-6xl md:text-8xl font-black font-mono text-white uppercase italic"
                        >
                            rawr<span className="text-primary tracking-normal">.xyz</span>
                        </motion.h1>
                        <div className="mt-4 h-[2px] w-24 bg-gradient-to-r from-transparent via-primary to-transparent mx-auto opacity-50" />
                    </div>

                    <div className="flex flex-wrap justify-center gap-4">
                        <LinkButton href="https://discord.com/invite/eMpUQzFrNG" iconName="message-circle" label="Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" iconName="github" label="GitHub" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" iconName="youtube" label="YouTube" />
                    </div>

                    <ScriptBlock />
                </motion.div>

                <footer className="mt-20 z-20 text-[10px] font-mono text-white/10 tracking-[0.8em] uppercase text-center select-none">
                    rawr.xyz V1.5.1 // Made for Accuracy :3
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
