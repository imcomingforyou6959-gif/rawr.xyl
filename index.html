<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | v1.6.0 Protocol</title>
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: '#070707', primary: '#ef4444' }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #070707; 
            margin: 0; 
            overflow-x: hidden; 
            color: white; 
            user-select: none;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.3); border-radius: 10px; }

        /* Rain Slider Styling */
        input[type='range'] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.05);
            height: 4px;
            border-radius: 5px;
            accent-color: #ef4444;
        }

        #root { position: relative; z-index: 10; }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="RainBackground.jsx?v=2.2"></script>
    <script type="text/babel" src="ScriptBlock.jsx?v=2.2"></script>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;

        function Home() {
            const [page, setPage] = React.useState('main'); 
            const [rainSpeed, setRainSpeed] = React.useState(1);
            const [viewers, setViewers] = React.useState("...");
            const [discordOnline, setDiscordOnline] = React.useState("...");
            const [logs, setLogs] = React.useState([
                "System initialized.",
                "Fetching repository data...",
                "Waiting for input..."
            ]);

            const serverID = "1476151042759721002";

            React.useEffect(() => {
                // 1. Live Site Views
                const fetchViews = () => {
                    fetch(`https://api.countapi.xyz/hit/rawr.xyz/visits?t=${Date.now()}`)
                        .then(res => res.json())
                        .then(data => setViewers(data.value))
                        .catch(() => setViewers("Active"));
                };
                fetchViews();

                // 2. Discord Server Stats
                const fetchDiscord = () => {
                    fetch(`https://discord.com/api/guilds/${serverID}/widget.json`)
                        .then(res => res.json())
                        .then(data => setDiscordOnline(data.presence_count || "Online"))
                        .catch(() => setDiscordOnline("Active"));
                };
                fetchDiscord();

                // 3. Activity Logs Simulation
                const logOptions = [
                    "Bypassing check...",
                    "Injection successful",
                    "V1.6.0 stable",
                    "Security layer 2 active",
                    "Cache cleared"
                ];
                const logInterval = setInterval(() => {
                    setLogs(prev => {
                        const newLog = `[${new Date().toLocaleTimeString()}] ${logOptions[Math.floor(Math.random() * logOptions.length)]}`;
                        return [newLog, ...prev.slice(0, 3)];
                    });
                }, 7000);

                return () => clearInterval(logInterval);
            }, []);

            return (
                <div className="relative min-h-screen flex flex-col items-center">
                    <RainBackground speed={rainSpeed} />
                    
                    {/* Navigation Bar */}
                    <nav className="fixed top-8 z-50 glass rounded-2xl p-1.5 flex gap-1 shadow-2xl">
                        {['main', 'about me'].map(targetPage => (
                            <button 
                                key={targetPage}
                                onClick={() => setPage(targetPage)}
                                className={`px-8 py-2.5 rounded-xl text-[10px] font-mono tracking-[0.3em] transition-all uppercase ${page === targetPage ? 'bg-primary text-white shadow-[0_0_20px_rgba(239,68,68,0.3)]' : 'text-white/30 hover:text-white'}`}
                            >
                                {targetPage}
                            </button>
                        ))}
                    </nav>

                    <main className="relative z-10 flex flex-col items-center w-full px-6 pt-36 pb-20 max-w-4xl">
                        <AnimatePresence mode="wait">
                            {page === 'main' ? (
                                <motion.div 
                                    key="main"
                                    initial={{ opacity: 0, y: 15 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -15 }}
                                    className="flex flex-col items-center gap-10 w-full"
                                >
                                    <div className="flex flex-col items-center gap-6">
                                        <motion.img src="logo.png" className="w-32 h-32 md:w-48 object-contain drop-shadow-[0_0_30px_rgba(239,68,68,0.2)]" animate={{ y: [0, -10, 0] }} transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }} />
                                        <h1 className="text-5xl md:text-7xl font-bold font-mono tracking-tighter uppercase">rawr<span className="text-primary">.xyz</span></h1>
                                    </div>

                                    <ScriptBlock />

                                    {/* System Logs Window */}
                                    <div className="w-full max-w-lg glass rounded-2xl p-5">
                                        <div className="flex items-center gap-2 mb-4">
                                            <div className="w-1 h-3 bg-primary rounded-full animate-pulse"></div>
                                            <span className="text-[10px] font-mono uppercase tracking-[0.2em] text-white/40">Recent Activity</span>
                                        </div>
                                        <div className="space-y-1.5 h-24 overflow-y-auto custom-scrollbar">
                                            {logs.map((log, i) => (
                                                <div key={i} className="text-[10px] font-mono text-white/20 border-l border-white/10 pl-3">
                                                    {log}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Live Stats Row */}
                                    <div className="flex flex-wrap justify-center gap-4 w-full">
                                        <div className="glass px-6 py-3 rounded-2xl flex items-center gap-3">
                                            <div className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                                            <span className="text-[10px] font-mono text-white/30 uppercase tracking-[0.2em]">Visits: <span className="text-white font-bold">{viewers}</span></span>
                                        </div>
                                        <div className="glass px-6 py-3 rounded-2xl flex items-center gap-3">
                                            <div className="w-1.5 h-1.5 rounded-full bg-primary animate-pulse shadow-[0_0_10px_#ef4444]"></div>
                                            <span className="text-[10px] font-mono text-white/30 uppercase tracking-[0.2em]">Online: <span className="text-white font-bold">{discordOnline}</span></span>
                                        </div>
                                    </div>

                                    {/* Engine Speed Slider */}
                                    <div className="w-full max-w-lg glass p-6 rounded-2xl flex items-center gap-6">
                                        <span className="text-[10px] font-mono text-white/40 uppercase tracking-widest min-w-[80px]">Rain</span>
                                        <input type="range" min="0" max="3" step="0.5" value={rainSpeed} onChange={(e) => setRainSpeed(parseFloat(e.target.value))} className="flex-1 cursor-pointer" />
                                        <span className="text-[10px] font-mono text-primary font-bold">{rainSpeed}x</span>
                                    </div>
                                </motion.div>
                            ) : (
                                <motion.div 
                                    key="about me"
                                    initial={{ opacity: 0, scale: 0.98 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.98 }}
                                    className="flex flex-col items-center gap-8 w-full max-w-lg"
                                >
                                    {/* Profile Header */}
                                    <div className="w-full glass rounded-[2.5rem] p-10 flex flex-col items-center gap-6">
                                        <div className="relative">
                                            <img 
                                                src="IMG_4981.png" 
                                                className="w-32 h-32 rounded-full border-4 border-primary/20 shadow-[0_0_40px_rgba(239,68,68,0.3)]" 
                                            />
                                            <div className="absolute bottom-2 right-2 w-6 h-6 bg-green-500 border-4 border-[#070707] rounded-full"></div>
                                        </div>
                                        <div className="text-center">
                                            <h2 className="text-3xl font-mono font-bold tracking-tighter">@Onlyonestands</h2>
                                            <p className="text-primary text-[10px] font-mono tracking-[0.5em] uppercase mt-2">Site Owner</p>
                                        </div>
                                    </div>

                                    {/* Admin Contact Cards */}
                                    <div className="w-full space-y-3">
                                        {[
                                            { label: 'Discord', value: 'Onlyonestands' },
                                            { label: 'Email', value: 'rawr.xyl@gmail.com', href: 'mailto:rawr.xyl@gmail.com' },
                                            { label: 'Github', value: 'imcomingforyou6959-gif', href: 'https://github.com/imcomingforyou6959-gif' }
                                        ].map((card, i) => (
                                            <a 
                                                key={i}
                                                href={card.href} 
                                                target={card.href ? "_blank" : undefined}
                                                className="glass p-5 rounded-2xl flex items-center justify-between group hover:border-primary/40 transition-all"
                                            >
                                                <span className="text-[10px] font-mono text-white/30 uppercase tracking-widest">{card.label}</span>
                                                <span className="text-sm font-mono text-primary group-hover:underline">{card.value}</span>
                                            </a>
                                        ))}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="mt-auto py-10 text-[9px] font-mono text-white/5 uppercase tracking-[1em]">rawr.xyz protocol</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Home />);
    </script>
</body>
</html>
