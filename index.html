<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rawr.xyz | v1.6.5 Protocol</title>
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide for crisp icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #070707; 
            overflow-x: hidden; 
            color: white; 
            user-select: none;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Glassmorphic refined */
        .glass {
            background: rgba(12, 12, 15, 0.55);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .glass-card {
            background: rgba(8, 8, 12, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.25s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(239, 68, 68, 0.6);
            box-shadow: 0 0 28px rgba(239, 68, 68, 0.15);
        }

        .glow-hover {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .glow-hover:hover {
            transform: translateY(-4px);
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5));
        }

        /* Custom range */
        input[type='range'] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            height: 4px;
            border-radius: 8px;
        }
        input[type='range']:focus { outline: none; }
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ef4444;
            cursor: pointer;
            box-shadow: 0 0 12px #ef4444;
            border: none;
        }

        /* scanline premium */
        .scanline::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.08) 0px, rgba(0, 0, 0, 0.08) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
            border-radius: inherit;
        }
        
        /* pulse animation for status */
        @keyframes softPulse {
            0%, 100% { opacity: 0.6; transform: scale(0.95);}
            50% { opacity: 1; transform: scale(1.05);}
        }
        .pulse-ring {
            animation: softPulse 2s infinite ease;
        }
        
        /* Custom scroll */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: '#070707', primary: '#ef4444', dark: '#0F0F11' },
                    animation: {
                        'spin-slow': 'spin 12s linear infinite',
                        'float': 'float 5s ease-in-out infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-12px)' } }
                    }
                }
            }
        }
    </script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="RainBackground.jsx?v=3.0"></script>
<script type="text/babel" src="ScriptBlock.jsx?v=2.5"></script>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // improved Icon renderer with dynamic updates
    const DynamicIcon = ({ name, size = 22, className = "", strokeWidth = 1.5 }) => {
        const ref = React.useRef(null);
        React.useEffect(() => {
            if (ref.current && lucide && lucide.createIcons) {
                lucide.createIcons({ icons: { [name]: true } });
            }
        }, [name]);
        return <i ref={ref} data-lucide={name} class={className} style={{ width: size, height: size, strokeWidth: strokeWidth }}></i>;
    };

    // XBOX + ROBLOX custom icons with rich branding (using brand icons + fallback)
    const BrandIcon = ({ type, size = 24 }) => {
        const iconMap = {
            xbox: 'gamepad-2',
            roblox: 'crown'
        };
        const label = type === 'xbox' ? 'Xbox' : 'Roblox';
        return (
            <div className="relative flex items-center justify-center">
                <DynamicIcon name={iconMap[type]} size={size} className="text-current" strokeWidth={1.8} />
                <span className="absolute -bottom-1 -right-1 text-[8px] font-mono font-black bg-black/70 px-1 rounded-full">{type === 'xbox' ? 'X' : 'R'}</span>
            </div>
        );
    };

    function Home() {
        const [page, setPage] = React.useState('main'); 
        const [intensity, setIntensity] = React.useState(1.2);
        const [discordStatus, setDiscordStatus] = React.useState("⟳ SYNC");
        const [hoverGlow, setHoverGlow] = React.useState(false);

        React.useEffect(() => {
            fetch(`https://discord.com/api/guilds/1476151042759721002/widget.json`)
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(data => setDiscordStatus(`${data.presence_count || 9} online`))
                .catch(() => setDiscordStatus("● active"));
        }, []);

        // Xbox & Roblox handlers
        const xboxProfile = "https://www.xbox.com/en-us/play/user/rawr%20cross";  // custom: rawr cross xbox gamertag style
        const robloxProfile = "https://www.roblox.com/users/engravingangels/profile"; // engravingangels roblox
        
        // personal gamer info
        const gamerTag = "rawr cross";
        const robloxName = "engravingangels";

        return (
            <div className="relative min-h-screen flex flex-col items-center">
                {/* Rain background with intensity control */}
                <RainBackground speed={intensity} />
                
                {/* Navigation - refined neon style */}
                <nav className="fixed top-6 z-50 glass rounded-3xl p-1.5 flex gap-1 shadow-2xl backdrop-blur-xl border border-white/10">
                    {[
                        { id: 'main', label: '⟡ PROTOCOL' },
                        { id: 'about me', label: '⚡ PROFILE' }
                    ].map(target => (
                        <button 
                            key={target.id}
                            onClick={() => setPage(target.id)}
                            className={`px-6 md:px-10 py-2.5 rounded-2xl text-[11px] font-mono tracking-[0.25em] font-bold transition-all duration-300 uppercase ${page === target.id ? 'bg-primary text-white shadow-[0_0_18px_#ef4444]' : 'text-white/40 hover:text-white hover:bg-white/5'}`}
                        >
                            {target.label}
                        </button>
                    ))}
                </nav>

                <main className="relative z-10 flex flex-col items-center w-full px-5 pt-36 pb-20 max-w-5xl">
                    <AnimatePresence mode="wait">
                        {page === 'main' ? (
                            <motion.div 
                                key="main"
                                initial={{ opacity: 0, y: 40 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -40 }}
                                transition={{ type: "spring", stiffness: 100, damping: 18 }}
                                className="flex flex-col items-center gap-12 w-full"
                            >
                                <div className="flex flex-col items-center gap-6">
                                    <motion.img 
                                        src="logo.png" 
                                        className="w-32 md:w-56 object-contain drop-shadow-[0_0_35px_rgba(239,68,68,0.4)] rounded-3xl" 
                                        animate={{ y: [0, -12, 0], rotateZ: [0, 1, 0, -1, 0] }} 
                                        transition={{ duration: 5, repeat: Infinity, ease: "easeInOut" }} 
                                        onError={(e) => { e.target.src = 'https://placehold.co/200x200/1a1a1a/ef4444?text=RAW'; }}
                                    />
                                    <div className="text-center">
                                        <h1 className="text-6xl md:text-8xl lg:text-9xl font-black font-mono tracking-tighter uppercase bg-clip-text text-transparent bg-gradient-to-r from-white via-white to-primary/70">
                                            rawr<span className="text-primary drop-shadow-[0_0_15px_#ef4444]">.xyz</span>
                                        </h1>
                                        <div className="flex justify-center gap-2 mt-3">
                                            <div className="h-[2px] w-16 bg-primary/60 rounded-full"></div>
                                            <span className="text-[10px] font-mono text-primary/80 tracking-[0.2em]">v1.6.5 ENCIPHERED</span>
                                            <div className="h-[2px] w-16 bg-primary/60 rounded-full"></div>
                                        </div>
                                    </div>
                                </div>

                                {/* ScriptBlock component (dynamic typing) */}
                                <ScriptBlock />

                                {/* Engine slider + gaming vibe */}
                                <div className="w-full max-w-lg glass-card rounded-3xl p-6 flex items-center gap-5 shadow-xl border-white/10">
                                    <div className="flex items-center gap-2">
                                        <DynamicIcon name="cpu" size={22} className="text-primary/80" />
                                        <span className="text-[10px] font-mono text-white/40 font-bold tracking-widest">RAIN INTENSITY</span>
                                    </div>
                                    <input 
                                        type="range" min="0.2" max="2.8" step="0.05" 
                                        value={intensity} 
                                        onChange={(e) => setIntensity(parseFloat(e.target.value))} 
                                        className="flex-1 cursor-pointer h-1.5 rounded-full bg-white/10" 
                                    />
                                    <span className="text-sm font-mono font-bold text-primary tabular-nums bg-black/30 px-3 py-1 rounded-full">{intensity.toFixed(1)}x</span>
                                </div>
                                
                                {/* Hint */}
                                <div className="text-center text-white/10 text-[9px] font-mono tracking-widest uppercase mt-2">
                                    ⚡ engine raw power · dynamic environment
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div 
                                key="about"
                                initial={{ opacity: 0, scale: 0.92 }}
                                animate={{ opacity: 1, scale: 1 }}
                                exit={{ opacity: 0, scale: 0.92 }}
                                transition={{ duration: 0.4 }}
                                className="flex flex-col items-center gap-8 w-full max-w-2xl"
                            >
                                {/* PROFILE CARD - Enhanced with Xbox & Roblox integrations */}
                                <div className="w-full glass-card rounded-[3rem] p-8 md:p-10 flex flex-col items-center gap-6 shadow-2xl relative overflow-hidden group scanline border-primary/20">
                                    <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary via-red-500 to-primary/30"></div>
                                    
                                    {/* Avatar with ring */}
                                    <div className="relative">
                                        <div className="absolute inset-0 rounded-full bg-primary/20 blur-xl animate-pulse"></div>
                                        <img 
                                            src="logo2.PNG" 
                                            className="w-36 h-36 md:w-48 md:h-48 rounded-full border-[5px] border-primary/70 shadow-2xl object-cover transition-all duration-500 group-hover:scale-105" 
                                            onError={(e) => { e.target.src = 'https://via.placeholder.com/200/111111/ef4444?text=RAW'; }}
                                        />
                                        <div className="absolute bottom-3 right-2 w-5 h-5 bg-green-500 border-[3px] border-black rounded-full shadow-lg pulse-ring"></div>
                                    </div>
                                    
                                    <div className="text-center space-y-2">
                                        <h2 className="text-4xl md:text-5xl font-mono font-black tracking-tighter bg-gradient-to-r from-white to-white/80 bg-clip-text text-transparent">Onlyonestands</h2>
                                        <div className="flex justify-center gap-3">
                                            <span className="px-4 py-1 rounded-full bg-primary/20 text-primary text-[11px] font-mono font-bold tracking-wider">◉ PROTOCOL LEAD</span>
                                        </div>
                                    </div>

                                    {/* Bio Text */}
                                    <div className="text-center max-w-md">
                                        <p className="text-white/70 text-sm leading-relaxed font-medium">
                                            Hi, I'm <span className="text-white border-b border-primary font-semibold">Tie</span>. Small coder, builder, and digital architect.  
                                            I craft experimental interfaces & push the raw edge of the web.
                                        </p>
                                    </div>

                                    {/* GAMER IDENTITY SECTION - XBOX + ROBLOX PREMIUM */}
                                    <div className="w-full mt-2 grid grid-cols-2 gap-4">
                                        {/* Xbox Card with custom "rawr cross" */}
                                        <a href={xboxProfile} target="_blank" rel="noopener noreferrer" className="glass-card rounded-2xl p-4 flex flex-col items-center gap-2 transition-all duration-300 hover:bg-primary/10 border-white/10 hover:border-primary/50 group">
                                            <div className="bg-gradient-to-br from-green-700/30 to-emerald-900/30 p-3 rounded-2xl">
                                                <BrandIcon type="xbox" size={32} />
                                            </div>
                                            <span className="font-mono text-sm font-bold tracking-wide">XBOX</span>
                                            <span className="text-[11px] font-mono text-primary/80 bg-black/40 px-3 py-0.5 rounded-full">@rawr cross</span>
                                            <span className="text-[8px] text-white/30 uppercase tracking-wider">⚡ rawr cross ⚡</span>
                                        </a>
                                        
                                        {/* Roblox Card with engravingangels */}
                                        <a href={robloxProfile} target="_blank" rel="noopener noreferrer" className="glass-card rounded-2xl p-4 flex flex-col items-center gap-2 transition-all duration-300 hover:bg-primary/10 border-white/10 hover:border-primary/50 group">
                                            <div className="bg-gradient-to-br from-red-800/30 to-rose-900/30 p-3 rounded-2xl">
                                                <BrandIcon type="roblox" size={32} />
                                            </div>
                                            <span className="font-mono text-sm font-bold tracking-wide">ROBLOX</span>
                                            <span className="text-[11px] font-mono text-primary/80 bg-black/40 px-3 py-0.5 rounded-full">engravingangels</span>
                                            <span className="text-[8px] text-white/30 uppercase tracking-wider">✦ builder ✦</span>
                                        </a>
                                    </div>
                                    
                                    {/* Enhanced Social Bar with Discord status + GitHub + Mail */}
                                    <div className="flex flex-wrap justify-center gap-5 mt-2">
                                        {[
                                            { icon: 'github', url: 'https://github.com/imcomingforyou6959-gif', label: 'GitHub', color: '#fff' },
                                            { icon: 'mail', url: 'mailto:rawr.xyl@gmail.com', label: 'Mail', color: '#ef4444' },
                                            { icon: 'message-circle', url: '#', label: discordStatus, custom: true, extra: 'Discord' }
                                        ].map((soc, idx) => (
                                            <a 
                                                key={idx} 
                                                href={soc.url} 
                                                target={soc.url !== '#' ? "_blank" : undefined}
                                                className="glass p-4 rounded-2xl transition-all duration-300 hover:scale-110 hover:bg-primary/10 flex flex-col items-center gap-1 min-w-[80px] group"
                                            >
                                                <DynamicIcon name={soc.icon} size={26} className="text-white/70 group-hover:text-primary transition" strokeWidth={1.6} />
                                                <span className="text-[9px] font-mono text-white/40 group-hover:text-white/80 uppercase tracking-wide">{soc.extra || soc.label}</span>
                                                {soc.custom && <span className="text-[10px] font-bold text-primary/90 mt-0.5">{discordStatus}</span>}
                                            </a>
                                        ))}
                                    </div>
                                    
                                    {/* Xbox & Roblox combined signature */}
                                    <div className="w-full pt-2 flex justify-center items-center gap-3 text-[9px] font-mono text-white/30 border-t border-white/5 mt-2">
                                        <span className="flex items-center gap-1"><DynamicIcon name="gamepad-2" size={12}/> rawr cross</span>
                                        <span className="text-primary/40">✦</span>
                                        <span className="flex items-center gap-1"><DynamicIcon name="crown" size={12}/> engravingangels</span>
                                    </div>
                                </div>
                                
                                {/* Status & Version Grid */}
                                <div className="w-full grid grid-cols-2 gap-4">
                                    <div className="glass p-5 rounded-2xl text-center border-l-2 border-primary/40">
                                        <DynamicIcon name="activity" size={16} className="text-primary/70 inline-block mr-1" />
                                        <p className="text-[10px] font-mono text-white/40 uppercase tracking-[0.2em] mb-1">STATUS</p>
                                        <p className="text-primary font-mono text-xs font-bold">● ENCRYPTED NEXUS</p>
                                    </div>
                                    <div className="glass p-5 rounded-2xl text-center border-r-2 border-primary/20">
                                        <DynamicIcon name="code-2" size={16} className="text-primary/70 inline-block mr-1" />
                                        <p className="text-[10px] font-mono text-white/40 uppercase tracking-[0.2em] mb-1">PROTOCOL</p>
                                        <p className="text-white/80 font-mono font-bold text-xs">v1.6.5 "RAW"</p>
                                    </div>
                                </div>

                                {/* special gamertag quote */}
                                <div className="text-center mt-2 w-full">
                                    <div className="inline-flex gap-2 bg-black/40 backdrop-blur-md rounded-full px-5 py-2 border border-white/5">
                                        <DynamicIcon name="joystick" size={14} className="text-primary" />
                                        <span className="text-[10px] font-mono tracking-wider text-white/60">XBOX: rawr cross | ROBLOX: engravingangels</span>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </main>

                <footer className="mt-auto py-10 text-[9px] font-mono text-white/10 uppercase tracking-[0.5em] text-center w-full border-t border-white/5">
                    rawr.xyz // encrypted pulse // established mmxxvi
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
