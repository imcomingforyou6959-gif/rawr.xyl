<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // ;( ---
    const CompatibilityBar = () => {
        const executors = [
            { name: "Xeno", status: "verified" },
            { name: "Velocity", status: "verified" },

                    <div className="h-[1px] flex-1 bg-white/5"></div>
                    <span className="text-[8px] sm:text-[9px] font-mono text-white/20 tracking-[0.3em] sm:tracking-[0.4em] uppercase font-bold whitespace-nowrap">Verified compatibility</span>
                    <div className="h-[1px] flex-1 bg-white/5"></div>
                </div>
                <div className="grid grid-cols-2 sm:flex sm:flex-wrap justify-center gap-x-4 sm:gap-x-10 gap-y-4 sm:gap-y-5">
                    {executors.map(({ name, status }) => (
                        <div key={name} className="flex items-center gap-2 group cursor-default">
                            <div className={`w-1.5 h-1.5 rounded-full ${status === 'verified' ? 'bg-green-500' : 'bg-yellow-500'} group-hover:bg-primary transition-all`}></div>
                            <span className="text-[9px] sm:text-[10px] font-mono font-black text-white/30 group-hover:text-white transition-colors tracking-tight uppercase">{name}</span>
                        </div>
                    ))}
                </div>
            </motion.div>
        );
    };

    // :)
    function ScriptBlock() {
        const [copied, setCopied] = React.useState(false);
        const [config, setConfig] = React.useState({
            version: "v1.5.1",
            status: "ONLINE",
            statusColor: "green",
            changelog: "Improved stability + new hub integration"
        });
        React.useEffect(() => {
            const fetchStatus = async () => {
                try {
                    const jsonUrl = `https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyl/refs/heads/main/status.json?t=${Date.now()}`;
                    const response = await fetch(jsonUrl);
                    if (response.ok) {
                        const data = await response.json();
                        setConfig(data);
                    }
                } catch (error) {
                    console.log('Using default config');
                }
            };
            fetchStatus();
            const interval = setInterval(fetchStatus, 30000);
            return () => clearInterval(interval);
        }, []);
        const handleCopy = async () => {
            const scriptText = `loadstring(game:HttpGet("https://rawrs.zapto.org/file.txt", true))()`;
            try {
                await navigator.clipboard.writeText(scriptText);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard');
            }
        };
        const scriptText = `loadstring(game:HttpGet("https://rawrs.zapto.org/file.txt", true))()`;
        return (
            <div className="flex flex-col items-center w-full">
                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="relative w-full max-w-3xl bg-black/40 border border-white/10 rounded-xl sm:rounded-2xl overflow-hidden backdrop-blur-md mt-8 sm:mt-12 shadow-2xl mx-6 sm:mx-0">
                    <div className="flex items-center justify-between px-5 sm:px-6 py-4 sm:py-5 bg-white/5 border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-code text-primary/50 text-xs"></i>
                            <span className="text-[9px] sm:text-[10px] font-mono text-white/30 uppercase tracking-widest">{config.version}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${config.statusColor === 'green' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                            <span className="text-[8px] sm:text-[9px] font-bold text-white/40 uppercase">{config.status}</span>
                        </div>
                    </div>
                    <div className="p-5 sm:p-7">
                        <div className="bg-black/60 rounded-lg sm:rounded-xl p-4 sm:p-5 mb-5 border border-white/5 overflow-x-auto">
                            <code className="text-primary text-[10px] sm:text-[11px] font-mono break-all select-all whitespace-normal sm:whitespace-pre-wrap">
                                {scriptText}
                            </code>
                        </div>
                        <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={handleCopy} className="w-full py-3 sm:py-4 bg-primary/10 hover:bg-primary text-primary hover:text-black border border-primary/20 rounded-lg sm:rounded-xl font-black text-[10px] sm:text-[11px] tracking-widest transition-all uppercase flex items-center justify-center gap-2">
                            <i className={`fas ${copied ? 'fa-check' : 'fa-copy'} text-[10px] sm:text-[11px]`}></i>
                            {copied ? "Copied Successfully" : "Copy Official Script"}
                        </motion.button>
                        {config.changelog && (
                            <div className="mt-4 text-center">
                                <span className="text-[8px] sm:text-[9px] text-white/20">
                                    <i className="fas fa-info-circle mr-2"></i> {config.changelog}
                                </span>
                            </div>
                        )}
                    </div>
                </motion.div>
                <CompatibilityBar />
            </div>
        );
    }

    // --- RAIN BACKGROUND (same aesthetic) ---
    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        const animationRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let drops = [];
            let width = window.innerWidth;
            let height = window.innerHeight;
            const init = () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                const isMobile = width < 640;
                const dropCount = isMobile ? Math.min(30, Math.floor(width / 50)) : Math.min(80, Math.floor(width / 30));
                drops = Array.from({ length: dropCount }, () => ({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    len: Math.random() * 20 + 10,
                    vel: Math.random() * 8 + 4
                }));
            };
            const draw = () => {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.3;
                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + d.len);
                    ctx.stroke();
                    d.y += d.vel;
                    if (d.y > height) { d.y = -20; d.x = Math.random() * width; }
                });
                animationRef.current = requestAnimationFrame(draw);
            };
            init();
            draw();
            window.addEventListener('resize', init);
            return () => {
                window.removeEventListener('resize', init);
                if (animationRef.current) cancelAnimationFrame(animationRef.current);
            };
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    const LinkButton = ({ href, icon, label, external = true, className = "" }) => (
        <motion.a
            whileHover={{ scale: 1.05 }}
            whileTap={{ scale: 0.95 }}
            href={href}
            target={external ? "_blank" : "_self"}
            rel={external ? "noopener noreferrer" : ""}
            className={`flex items-center gap-3 sm:gap-4 px-6 sm:px-8 py-3 sm:py-4 bg-white/[0.02] border border-white/5 rounded-lg sm:rounded-2xl hover:bg-white/[0.06] hover:border-primary/40 transition-all group backdrop-blur-sm ${className}`}
        >
            <i className={`${icon} text-white/30 group-hover:text-primary transition-colors text-lg sm:text-xl`}></i>
            <span className="font-bold text-[11px] sm:text-[13px] tracking-tight text-white/60 group-hover:text-white transition-colors">{label}</span>
        </motion.a>
    );

    function App() {

        return (
            <div className="relative min-h-screen w-full flex flex-col items-center justify-center bg-background px-6 sm:px-6 overflow-hidden py-16 sm:py-24">

                <div className="fixed inset-0 bg-gradient-to-tr from-background via-transparent to-primary/5 z-10 pointer-events-none" />

                {/* notification */}
                <AnimatePresence>
                    {showTopNotice && (

                    )}
                </AnimatePresence>

                <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 0.8 }} className="relative z-20 flex flex-col items-center w-full max-w-4xl">
                    
                    {/* assets */}
                    <motion.img
                        src="logo.png"

                        alt="rawr.xyz logo"

                    <div className="text-center mb-8 sm:mb-12">
                        <h1 className="text-5xl sm:text-7xl md:text-8xl font-black font-mono text-white italic tracking-tighter uppercase leading-tight">
                            rawr<span className="text-primary">.xyz</span>
                        </h1>
                        {/* PH2*/}
                    </div>

                    {/**/}
                    <div className="flex flex-wrap justify-center gap-3 mb-10 sm:mb-14">
                        <motion.a 
                            whileHover={{ scale: 1.02 }}
                            href="#main"
                            className="px-6 py-2.5 rounded-full bg-primary/20 text-primary border border-primary/30 text-[11px] font-black uppercase tracking-wider backdrop-blur-sm"
                        >
                            <i className="fas fa-home mr-2"></i> home
                        </motion.a>
                        <motion.a 
                            whileHover={{ scale: 1.02 }}
                            href="#announcement"
                            className="px-6 py-2.5 rounded-full bg-white/5 text-white/70 hover:text-white border border-white/10 text-[11px] font-black uppercase tracking-wider transition-all"
                        >
                            <i className="fas fa-asterisk mr-2"></i> hub news
                        </motion.a>
                        <motion.a 
                            whileHover={{ scale: 1.02 }}
                            href="https://discord.com/invite/64VAka5RPK"
                            target="_blank"
                            className="px-6 py-2.5 rounded-full bg-white/5 text-white/70 hover:text-white border border-white/10 text-[11px] font-black uppercase tracking-wider transition-all"

                        </motion.a>
                    </div>

                    {/* */}
                    <motion.div 
                        id="announcement"
                        initial={{ opacity: 0, y: 15 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: 0.2 }}
                        className="w-full max-w-3xl mb-10 announcement-badge rounded-xl p-4 sm:p-5 border border-primary/20 bg-primary/5 backdrop-blur-sm"
                    >
                        <div className="flex items-start gap-3">
                            <div className="mt-0.5">
                                <i className="fas fa-gamepad text-primary text-lg"></i>
                            </div>
                            <div>
                                <h3 className="text-white font-bold text-sm sm:text-base tracking-tight">Update</h3>
                                <p className="text-white/70 text-xs sm:text-sm leading-relaxed mt-1">
                                    We’ve moved <span className="text-primary font-semibold">most supported games</span> into a hub! 
                                    Better performance, Casual updates, and more to come. 
                                    Access everything through our new <span className="text-white/90 font-mono text-[11px]">Universal.lua</span> loader.
                                </p>
                                <div className="flex flex-wrap gap-3 mt-3">
                                    <span className="text-[9px] bg-primary/20 text-primary px-2 py-0.5 rounded-full">Updates</span>
                                    <span className="text-[9px] bg-white/5 text-white/40 px-2 py-0.5 rounded-full">Universal and 3+ Games</span>
                                    <span className="text-[9px] bg-white/5 text-white/40 px-2 py-0.5 rounded-full">Good for u <3</span>
                                </div>
                            </div>
                        </div>
                    </motion.div>

                    {/**/}
                    <ScriptBlock />

                    {/**/}
                    <div className="flex flex-wrap justify-center gap-4 sm:gap-6 mt-12 sm:mt-16 w-full max-w-3xl">
                        <LinkButton href="https://discord.com/invite/64VAka5RPK" icon="fa-brands fa-discord" label="Join Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" icon="fa-brands fa-github" label="Repository" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" icon="fa-brands fa-youtube" label="Showcase" />
                    </div>
                </motion.div>

                {/**/}
                <footer className="mt-20 sm:mt-28 z-20 text-center select-none w-full max-w-4xl">
                    <div className="text-[8px] sm:text-[10px] font-mono text-white/15 tracking-[0.5em] sm:tracking-[0.8em] uppercase mb-4">
                        rawr.xyz /\ Made in 2026 <3
                    </div>
                    <div className="flex flex-wrap justify-center gap-3 sm:gap-6 text-[8px] sm:text-[9px] font-mono text-white/30 tracking-normal">
                        <a href="#" className="footer-link hover:text-primary transition">Home</a>
                        <span className="text-white/10">•</span>
                        <a href="/tos" className="footer-link hover:text-primary transition">Terms of Service</a>
                        <span className="text-white/10">•</span>
                        <a href="/privacy" className="footer-link hover:text-primary transition">Privacy Policy</a>
                        <span className="text-white/10">•</span>
                        <a href="https://discord.com/invite/64VAka5RPK" target="_blank" rel="noopener noreferrer" className="footer-link hover:text-primary transition">
                            <i className="fab fa-discord mr-1"></i>Support
                        </a>
                    </div>
                    <div className="text-[7px] sm:text-[8px] font-mono text-white/10 mt-4">
                        © 2026 rawr.xyz — all assets belong to their respective owners
                    </div>
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));

</script>
