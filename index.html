<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | OG</title>
    
    <link rel="icon" type="image/png" href="logo2.PNG">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                        muted: 'rgba(255, 255, 255, 0.4)'
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }

        .rain-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
            z-index: 1; 
            opacity: 0.15; 
        }

        /* Smooth scanline effect for the OG look */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(239, 68, 68, 0.1);
            position: fixed;
            z-index: 5;
            top: 0;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion } = window.Motion;

    const ScriptBlock = () => {
        const [log, setLog] = React.useState("> initializing...");
        
        React.useEffect(() => {
            const sequence = [
                "> mounting b4nex.core...",
                "> check status: active",
                "> bypass_tpm: enabled",
                "> local_ip: [protected]",
                "> connection: encrypted",
                "> welcome back, user"
            ];
            let i = 0;
            const interval = setInterval(() => {
                setLog(sequence[i % sequence.length]);
                i++;
            }, 3000);
            return () => clearInterval(interval);
        }, []);

        return (
            <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                className="w-full max-w-xs bg-white/5 border border-white/5 backdrop-blur-md p-3 rounded-xl font-mono text-[10px] text-white/40 flex items-center gap-3"
            >
                <div className="w-1.5 h-1.5 bg-primary rounded-full animate-pulse shadow-[0_0_8px_#ef4444]" />
                <span className="tracking-tight">{log}</span>
            </motion.div>
        );
    };

    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];

            const init = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                drops = Array.from({ length: 70 }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    len: Math.random() * 15 + 5,
                    vel: Math.random() * 8 + 4
                }));
            };

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + d.len);
                    ctx.stroke();
                    d.y += d.vel;
                    if (d.y > canvas.height) {
                        d.y = -20;
                        d.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            };

            window.addEventListener('resize', init);
            init(); draw();
            return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    const LinkButton = ({ href, iconName, label }) => {
        React.useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, []);

        return (
            <a 
                href={href} 
                target="_blank" 
                className="flex items-center gap-3 px-6 py-3 bg-white/[0.03] border border-white/5 rounded-2xl hover:bg-white/[0.08] hover:border-primary/40 transition-all group"
            >
                <i data-lucide={iconName} className="w-5 h-5 text-white/50 group-hover:text-primary transition-colors"></i>
                <span className="font-bold text-sm tracking-tight text-white/80">{label}</span>
            </a>
        );
    };

    function Home() {
        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-6">
                <RainBackground />
                <div className="scanline" />
                
                <div className="fixed inset-0 bg-gradient-to-b from-transparent via-background/10 to-background z-10 pointer-events-none" />

                <motion.div 
                    initial={{ opacity: 0, y: 40 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ duration: 1.2, ease: [0.22, 1, 0.36, 1] }}
                    className="relative z-20 flex flex-col items-center gap-10 w-full max-w-xl"
                >
                    {/* Main Website Logo / Icon */}
                    <motion.div 
                        whileHover={{ scale: 1.05 }}
                        className="relative p-1 bg-gradient-to-b from-primary/20 to-transparent rounded-[2.5rem]"
                    >
                        <img 
                            src="logo2.PNG" 
                            className="w-28 h-28 md:w-32 md:h-32 rounded-[2.2rem] shadow-[0_20px_50px_rgba(0,0,0,0.8)] border border-white/5" 
                            alt="rawr logo" 
                        />
                    </motion.div>

                    {/* Header Text */}
                    <div className="text-center">
                        <h1 className="text-5xl md:text-6xl font-black font-mono tracking-tighter text-white uppercase italic">
                            rawr<span className="text-primary">.xyz</span>
                        </h1>
                        <div className="mt-3 h-[1px] w-20 bg-gradient-to-r from-transparent via-primary/40 to-transparent mx-auto" />
                    </div>

                    {/* Links Grid */}
                    <div className="flex flex-wrap justify-center gap-4">
                        <LinkButton href="https://discord.com/invite/eMpUQzFrNG" iconName="message-circle" label="Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" iconName="github" label="GitHub" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" iconName="youtube" label="YouTube" />
                        <LinkButton href="#" iconName="folder-code" label="Portfolio" />
                    </div>

                    {/* ScriptBlock component call */}
                    <ScriptBlock />
                </motion.div>

                {/* Footer */}
                <footer className="absolute bottom-8 z-20 text-[9px] font-mono text-white/10 tracking-[0.4em] uppercase">
                    Protocol v2.1 // Protected Environment
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
