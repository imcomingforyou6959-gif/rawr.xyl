<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | OG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505', // Real OG Black
                        primary: '#ef4444',    // Signature Red
                        foreground: '#ffffff',
                        muted: 'rgba(255, 255, 255, 0.4)'
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        body { background-color: #050505; color: white; margin: 0; overflow: hidden; }
        .rain-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; opacity: 0.25; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // --- RAIN BACKGROUND ---
    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];

            const init = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                drops = Array.from({ length: 80 }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    len: Math.random() * 20 + 10,
                    vel: Math.random() * 10 + 5
                }));
            };

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                ctx.lineCap = 'round';
                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + d.len);
                    ctx.stroke();
                    d.y += d.vel;
                    if (d.y > canvas.height) {
                        d.y = -20;
                        d.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            };

            window.addEventListener('resize', init);
            init(); draw();
            return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    // --- SCRIPT BLOCK (Terminal) ---
    const ScriptBlock = () => {
        const [text, setText] = React.useState("");
        const [fullText, setFullText] = React.useState("> initializing b4nex_engine...");
        
        React.useEffect(() => {
            const logs = [
                "> mounting modules...",
                "> check status: active",
                "> welcome back, user",
                "> local_ip: [protected]",
                "> scripts loaded: 14"
            ];
            let i = 0;
            const interval = setInterval(() => {
                setFullText(logs[i % logs.length]);
                i++;
            }, 3500);
            return () => clearInterval(interval);
        }, []);

        return (
            <div className="w-full max-w-xs bg-black/40 border border-white/5 backdrop-blur-sm p-3 rounded-lg font-mono text-[10px] text-white/50">
                <div className="flex gap-2 items-center">
                    <span className="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
                    <span>{fullText}</span>
                </div>
            </div>
        );
    };

    // --- LINK BUTTON ---
    const LinkButton = ({ href, iconName, label }) => {
        React.useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, []);

        return (
            <a 
                href={href} 
                target="_blank" 
                className="flex items-center gap-3 px-6 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 hover:border-primary/50 transition-all group"
            >
                <i data-lucide={iconName} className="w-5 h-5 text-white/70 group-hover:text-primary transition-colors"></i>
                <span className="font-bold text-sm tracking-wide">{label}</span>
            </a>
        );
    };

    // --- MAIN HOME ---
    function Home() {
        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-6">
                <RainBackground />
                
                {/* Subtle Overlay */}
                <div className="fixed inset-0 bg-gradient-to-b from-transparent via-background/20 to-background z-10 pointer-events-none" />

                <motion.div 
                    initial={{ opacity: 0, y: 30 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ duration: 1, ease: "easeOut" }}
                    className="relative z-20 flex flex-col items-center gap-12 w-full max-w-xl"
                >
                    {/* Header */}
                    <div className="text-center">
                        <h1 className="text-5xl md:text-6xl font-black font-mono tracking-tighter text-white uppercase italic">
                            rawr<span className="text-primary">.xyz</span>
                        </h1>
                        <div className="mt-2 h-[2px] w-24 bg-gradient-to-r from-transparent via-primary to-transparent mx-auto opacity-50" />
                    </div>

                    {/* Social Buttons */}
                    <div className="flex flex-wrap justify-center gap-4">
                        <LinkButton href="https://discord.com/invite/eMpUQzFrNG" iconName="message-circle" label="Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" iconName="github" label="GitHub" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" iconName="youtube" label="YouTube" />
                        <LinkButton href="#" iconName="globe" label="Portfolio" />
                    </div>

                    {/* Script Logic */}
                    <ScriptBlock />
                </motion.div>

                {/* Footer */}
                <footer className="absolute bottom-8 z-20 text-[10px] font-mono text-white/20 tracking-[0.3em] uppercase">
                    Established 2026 / Local Protocol
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
