<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | OG</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }

        .rain-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
            z-index: 1; 
            opacity: 0.15; 
        }

        /* Scanline Overlay */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(239, 68, 68, 0.05);
            position: fixed;
            z-index: 5;
            top: 0;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion } = window.Motion;

    // --- ScriptBlock Component ---
    const ScriptBlock = () => {
        const [log, setLog] = React.useState("> initializing system...");
        
        React.useEffect(() => {
            const sequence = [
                "> mounting b4nex.core...",
                "> loading assets/logo.png",
                "> bypass_tpm: active",
                "> session_key: [encrypted]",
                "> welcome back, tie",
                "> scripts online: 14"
            ];
            let i = 0;
            const interval = setInterval(() => {
                setLog(sequence[i % sequence.length]);
                i++;
            }, 3000);
            return () => clearInterval(interval);
        }, []);

        return (
            <motion.div 
                initial={{ opacity: 0, scale: 0.95 }}
                animate={{ opacity: 1, scale: 1 }}
                className="w-full max-w-[280px] mt-6 bg-black/60 border border-white/5 backdrop-blur-md p-4 rounded-xl font-mono text-[10px] text-white/50 flex items-center gap-3 shadow-2xl"
            >
                <div className="w-1.5 h-1.5 bg-primary rounded-full animate-pulse shadow-[0_0_8px_#ef4444]" />
                <span className="tracking-tight truncate">{log}</span>
            </motion.div>
        );
    };

    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];

            const init = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                drops = Array.from({ length: 60 }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    len: Math.random() * 12 + 5,
                    vel: Math.random() * 7 + 3
                }));
            };

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + d.len);
                    ctx.stroke();
                    d.y += d.vel;
                    if (d.y > canvas.height) {
                        d.y = -20;
                        d.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            };

            window.addEventListener('resize', init);
            init(); draw();
            return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    const LinkButton = ({ href, iconName, label }) => {
        React.useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, []);

        return (
            <a 
                href={href} 
                target="_blank" 
                className="flex items-center gap-3 px-6 py-3 bg-white/[0.02] border border-white/5 rounded-2xl hover:bg-white/[0.08] hover:border-primary/30 transition-all group"
            >
                <i data-lucide={iconName} className="w-4 h-4 text-white/40 group-hover:text-primary transition-colors"></i>
                <span className="font-bold text-xs tracking-tight text-white/70">{label}</span>
            </a>
        );
    };

    function Home() {
        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-6 overflow-hidden">
                <RainBackground />
                <div className="scanline" />
                
                <div className="fixed inset-0 bg-gradient-to-b from-transparent via-background/20 to-background z-10 pointer-events-none" />

                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ duration: 0.8, ease: "easeOut" }}
                    className="relative z-20 flex flex-col items-center w-full max-w-xl"
                >
                    {/* Main Logo - Swapped to logo.png */}
                    <motion.div 
                        whileHover={{ scale: 1.02 }}
                        className="mb-8"
                    >
                        <img 
                            src="logo.png" 
                            className="w-24 h-24 md:w-28 md:h-28 rounded-[2rem] shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-white/5" 
                            alt="logo" 
                            onError={(e) => { e.target.src='https://via.placeholder.com/150/ef4444/ffffff?text=RAWR'; }}
                        />
                    </motion.div>

                    {/* Header */}
                    <div className="text-center mb-10">
                        <h1 className="text-5xl font-black font-mono tracking-tighter text-white uppercase italic">
                            rawr<span className="text-primary">.xyz</span>
                        </h1>
                        <div className="mt-2 h-[1px] w-12 bg-primary/40 mx-auto" />
                    </div>

                    {/* Buttons Grid */}
                    <div className="flex flex-wrap justify-center gap-3 mb-4">
                        <LinkButton href="https://discord.com/invite/eMpUQzFrNG" iconName="message-circle" label="Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" iconName="github" label="GitHub" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" iconName="youtube" label="YouTube" />
                    </div>

                    {/* Terminal Status - Re-centered and forced visible */}
                    <ScriptBlock />
                </motion.div>

                {/* Footer */}
                <footer className="absolute bottom-8 z-20 text-[8px] font-mono text-white/10 tracking-[0.5em] uppercase">
                    Protocol v2.2 // Built for Performance
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
