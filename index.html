<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | v1.5.0 Protocol</title>
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: '#070707', primary: '#ef4444' }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #070707; 
            margin: 0; 
            overflow-x: hidden; 
            color: white; 
            user-select: none;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.4); border-radius: 10px; }

        /* UI Elements */
        input[type='range'] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 10px;
            accent-color: #ef4444;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
        }

        .glow-hover:hover {
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="RainBackground.jsx?v=2.2"></script>
    <script type="text/babel" src="ScriptBlock.jsx?v=2.2"></script>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;

        function Home() {
            const [page, setPage] = React.useState('main'); 
            const [rainSpeed, setRainSpeed] = React.useState(1);
            const [viewers, setViewers] = React.useState("...");
            const [discordOnline, setDiscordOnline] = React.useState("...");
            const [logs, setLogs] = React.useState([
                "System initialized.",
                "Repository sync complete.",
                "Terminal ready."
            ]);

            const serverID = "1476151042759721002";

            React.useEffect(() => {
                const fetchViews = () => {
                    fetch(`https://api.countapi.xyz/hit/rawr.xyz/visits?t=${Date.now()}`)
                        .then(res => res.json())
                        .then(data => setViewers(data.value || "Online"))
                        .catch(() => setViewers("Active"));
                };
                fetchViews();

                const fetchDiscord = () => {
                    fetch(`https://discord.com/api/guilds/${serverID}/widget.json`)
                        .then(res => res.json())
                        .then(data => setDiscordOnline(data.presence_count || "Online"))
                        .catch(() => setDiscordOnline("Active"));
                };
                fetchDiscord();

                const logOptions = [
                    "Bypassing check...", 
                    "Injection successful", 
                    "V1.5.0 stable", 
                    "Security layer active", 
                    "Thread synchronized",
                    "Packets routing..."
                ];
                const logInterval = setInterval(() => {
                    setLogs(prev => {
                        const newLog = `[${new Date().toLocaleTimeString([], {hour12: false})}] ${logOptions[Math.floor(Math.random() * logOptions.length)]}`;
                        return [newLog, ...prev.slice(0, 3)];
                    });
                }, 6000);

                return () => clearInterval(logInterval);
            }, []);

            return (
                <div className="relative min-h-screen flex flex-col items-center">
                    <RainBackground speed={rainSpeed} />
                    
                    <nav className="fixed top-8 z-50 glass rounded-2xl p-1.5 flex gap-1 shadow-2xl">
                        {['main', 'about me'].map(targetPage => (
                            <button 
                                key={targetPage}
                                onClick={() => setPage(targetPage)}
                                className={`px-6 md:px-10 py-3 rounded-xl text-[10px] font-mono tracking-[0.4em] transition-all duration-300 uppercase ${page === targetPage ? 'bg-primary text-white shadow-[0_0_25px_rgba(239,68,68,0.4)]' : 'text-white/20 hover:text-white hover:bg-white/5'}`}
                            >
                                {targetPage}
                            </button>
                        ))}
                    </nav>

                    <main className="relative z-10 flex flex-col items-center w-full px-6 pt-36 pb-20 max-w-4xl">
                        <AnimatePresence mode="wait">
                            {page === 'main' ? (
                                <motion.div 
                                    key="main"
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -20 }}
                                    transition={{ duration: 0.4 }}
                                    className="flex flex-col items-center gap-12 w-full"
                                >
                                    <div className="flex flex-col items-center gap-8">
                                        <motion.img 
                                            src="logo.png" 
                                            className="w-32 h-32 md:w-52 object-contain drop-shadow-[0_0_35px_rgba(239,68,68,0.25)]" 
                                            animate={{ y: [0, -12, 0] }} 
                                            transition={{ duration: 5, repeat: Infinity, ease: "easeInOut" }} 
                                        />
                                        <h1 className="text-5xl md:text-8xl font-bold font-mono tracking-tighter uppercase text-center">
                                            rawr<span className="text-primary animate-pulse">.xyz</span>
                                        </h1>
                                    </div>

                                    <ScriptBlock />

                                    <div className="w-full max-w-lg glass rounded-3xl p-6 shadow-inner">
                                        <div className="flex items-center gap-3 mb-5 border-b border-white/5 pb-3">
                                            <div className="w-2 h-2 bg-primary rounded-full animate-ping"></div>
                                            <span className="text-[10px] font-mono uppercase tracking-[0.3em] text-white/50 font-bold">System Telemetry</span>
                                        </div>
                                        <div className="space-y-2 h-28 overflow-y-auto custom-scrollbar">
                                            {logs.map((log, i) => (
                                                <div key={i} className="text-[10px] font-mono text-white/20 border-l-2 border-white/5 pl-4 py-1 hover:text-white/40 transition-colors">
                                                    {log}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap justify-center gap-5 w-full">
                                        <div className="glass px-8 py-4 rounded-2xl flex items-center gap-4 group transition-all hover:border-primary/20">
                                            <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e]"></div>
                                            <span className="text-[10px] font-mono text-white/30 uppercase tracking-[0.2em]">Visits: <span className="text-white font-bold group-hover:text-primary transition-colors">{viewers}</span></span>
                                        </div>
                                        <div className="glass px-8 py-4 rounded-2xl flex items-center gap-4 group transition-all hover:border-primary/20">
                                            <div className="w-2 h-2 rounded-full bg-primary shadow-[0_0_12px_#ef4444]"></div>
                                            <span className="text-[10px] font-mono text-white/30 uppercase tracking-[0.2em]">Online: <span className="text-white font-bold group-hover:text-primary transition-colors">{discordOnline}</span></span>
                                        </div>
                                    </div>

                                    <div className="w-full max-w-lg glass p-7 rounded-3xl flex items-center gap-8 shadow-xl">
                                        <span className="text-[10px] font-mono text-white/40 uppercase tracking-[0.4em] min-w-[90px]">Engine</span>
                                        <input type="range" min="0" max="3" step="0.5" value={rainSpeed} onChange={(e) => setRainSpeed(parseFloat(e.target.value))} className="flex-1 cursor-pointer" />
                                        <span className="text-[10px] font-mono text-primary font-black w-8">{rainSpeed}x</span>
                                    </div>
                                </motion.div>
                            ) : (
                                <motion.div 
                                    key="about me"
                                    initial={{ opacity: 0, scale: 0.95 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.95 }}
                                    transition={{ duration: 0.4 }}
                                    className="flex flex-col items-center gap-10 w-full max-w-xl"
                                >
                                    <div className="w-full glass rounded-[3rem] p-10 md:p-16 flex flex-col items-center gap-8 shadow-2xl relative overflow-hidden group">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
                                        <div className="relative">
                                            <img 
                                                src="logo2.PNG" 
                                                className="w-36 h-36 md:w-44 md:h-44 rounded-full border-[6px] border-white/5 shadow-[0_0_50px_rgba(239,68,68,0.2)] object-cover aspect-square transition-transform duration-500 group-hover:scale-105" 
                                            />
                                            <div className="absolute bottom-3 right-3 w-6 h-6 md:w-7 md:h-7 bg-green-500 border-[5px] border-[#111] rounded-full shadow-lg animate-pulse"></div>
                                        </div>
                                        <div className="text-center">
                                            <h2 className="text-3xl md:text-4xl font-mono font-black tracking-tighter uppercase">@Onlyonestands</h2>
                                            <div className="flex items-center justify-center gap-3 mt-3">
                                                <div className="h-[1px] w-8 bg-primary/30"></div>
                                                <p className="text-primary text-[10px] font-mono tracking-[0.6em] uppercase font-bold">Site Owner</p>
                                                <div className="h-[1px] w-8 bg-primary/30"></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full space-y-4">
                                        {[
                                            { label: 'Discord', value: 'Onlyonestands' },
                                            { label: 'Email', value: 'rawr.xyl@gmail.com', href: 'mailto:rawr.xyl@gmail.com' },
                                            { label: 'Github', value: 'imcomingforyou6959-gif', href: 'https://github.com/imcomingforyou6959-gif' }
                                        ].map((card, i) => (
                                            <a 
                                                key={i}
                                                href={card.href} 
                                                target={card.href ? "_blank" : undefined}
                                                className="glass p-6 rounded-[1.5rem] flex items-center justify-between group transition-all hover:bg-white/5 hover:translate-x-2 duration-300 glow-hover"
                                            >
                                                <span className="text-[10px] font-mono text-white/30 uppercase tracking-[0.4em] font-bold">{card.label}</span>
                                                <span className="text-[12px] md:text-sm font-mono text-primary font-bold group-hover:text-white transition-colors">{card.value}</span>
                                            </a>
                                        ))}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="mt-auto py-12 text-[10px] font-mono text-white/10 uppercase tracking-[1.2em] text-center w-full">
                        rawr.xyz protocol v1.5.0
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Home />);
    </script>
</body>
</html>
