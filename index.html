<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | OG</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        body { background-color: #050505; color: white; margin: 0; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .rain-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; opacity: 0.15; }
        .scanline { width: 100%; height: 2px; background: rgba(239, 68, 68, 0.05); position: fixed; z-index: 5; top: 0; animation: scan 8s linear infinite; }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // --- THIS IS THE SCRIPTBLOCK COMPONENT ---
    function ScriptBlock() {
        const [copied, setCopied] = React.useState(false);
        const [config, setConfig] = React.useState({
            version: "V1.0.0",
            status: "CHECKING...",
            statusColor: "gray"
        });

        const scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyz/refs/heads/main/.exe"))()`;

        React.useEffect(() => {
            const jsonUrl = "https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyz/main/status.json";
            fetch(jsonUrl)
                .then(response => response.json())
                .then(data => setConfig(data))
                .catch(err => {
                    // Fallback visual if fetch fails
                    setConfig({ version: "v1.7.2", status: "ONLINE", statusColor: "green" });
                });
        }, []);

        const handleCopy = async () => {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(scriptText);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = scriptText;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    textArea.remove();
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            } catch (err) { console.error('Copy failed', err); }
        };

        const dotColorClass = config.statusColor === "green" ? "bg-green-500" : config.statusColor === "red" ? "bg-red-500" : "bg-yellow-500";
        const textColorClass = config.statusColor === "green" ? "text-green-500/80" : config.statusColor === "red" ? "text-red-500/80" : "text-yellow-500/80";

        return (
            <div className="relative w-full max-w-lg bg-black/60 border border-white/10 rounded-xl overflow-hidden backdrop-blur-md shadow-2xl mt-8">
                <div className="flex items-center justify-between px-4 py-3 bg-white/5 border-b border-white/10">
                    <div className="flex items-center gap-4">
                        <div className="flex gap-1.5">
                            <div className="w-2.5 h-2.5 rounded-full bg-[#ff5f56]"></div>
                            <div className="w-2.5 h-2.5 rounded-full bg-[#ffbd2e]"></div>
                            <div className="w-2.5 h-2.5 rounded-full bg-[#27c93f]"></div>
                        </div>
                        <span className="text-[10px] font-mono text-white/30 bg-white/5 px-2 py-0.5 rounded border border-white/5 uppercase">{config.version}</span>
                    </div>
                    <div className="flex items-center gap-2">
                        <span className="relative flex h-2 w-2">
                            <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${dotColorClass}`}></span>
                            <span className={`relative inline-flex rounded-full h-2 w-2 ${dotColorClass}`}></span>
                        </span>
                        <span className={`text-[10px] font-mono uppercase tracking-widest font-bold ${textColorClass}`}>{config.status}</span>
                    </div>
                </div>
                <div className="p-6">
                    <div className="bg-black/40 rounded-lg p-4 mb-4 border border-white/5 group-hover:border-primary/20 transition-colors">
                        <code className="block font-mono text-[10px] md:text-xs text-primary/90 break-all leading-relaxed">
                            <span className="text-white/20 mr-2">$</span>{scriptText}
                        </code>
                    </div>
                    <button onClick={handleCopy} className="relative w-full py-4 rounded-lg font-mono text-[10px] font-bold transition-all border border-primary/30 bg-primary/5 hover:bg-primary/20 text-white tracking-widest overflow-hidden active:scale-95">
                        <AnimatePresence mode="wait">
                            {copied ? (
                                <motion.div key="suc" initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: -20, opacity: 0 }} className="absolute inset-0 flex items-center justify-center bg-primary text-white">SUCCESS! COPIED</motion.div>
                            ) : (
                                <motion.span key="lab" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>CLICK TO COPY SCRIPT</motion.span>
                            )}
                        </AnimatePresence>
                    </button>
                </div>
            </div>
        );
    }

    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];
            const init = () => {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                drops = Array.from({ length: 60 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, len: Math.random() * 15, vel: Math.random() * 8 + 4 }));
            };
            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1;
                drops.forEach(d => {
                    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len); ctx.stroke();
                    d.y += d.vel; if (d.y > canvas.height) d.y = -20;
                });
                requestAnimationFrame(draw);
            };
            init(); draw();
            window.addEventListener('resize', init);
            return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    const LinkButton = ({ href, iconName, label }) => {
        React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
        return (
            <a href={href} target="_blank" className="flex items-center gap-3 px-5 py-3 bg-white/[0.03] border border-white/5 rounded-xl hover:bg-white/[0.08] hover:border-primary/40 transition-all group">
                <i data-lucide={iconName} className="w-4 h-4 text-white/40 group-hover:text-primary transition-colors"></i>
                <span className="font-bold text-xs tracking-tight text-white/70">{label}</span>
            </a>
        );
    };

    // --- MAIN HOME PAGE ---
    function Home() {
        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-6">
                <RainBackground />
                <div className="scanline" />
                <div className="fixed inset-0 bg-gradient-to-b from-transparent via-background/20 to-background z-10 pointer-events-none" />

                <motion.div 
                    initial={{ opacity: 0, y: 20 }} 
                    animate={{ opacity: 1, y: 0 }} 
                    transition={{ duration: 0.8 }} 
                    className="relative z-20 flex flex-col items-center w-full max-w-xl"
                >
                    <img src="logo.png" className="w-24 h-24 md:w-28 md:h-28 rounded-[2rem] shadow-2xl border border-white/5 mb-8" alt="logo" />
                    
                    <div className="text-center mb-10">
                        <h1 className="text-5xl md:text-6xl font-black font-mono tracking-tighter text-white uppercase italic">rawr<span className="text-primary">.xyz</span></h1>
                        <div className="mt-2 h-[1px] w-12 bg-primary/40 mx-auto" />
                    </div>

                    <div className="flex flex-wrap justify-center gap-3">
                        <LinkButton href="https://discord.com/invite/eMpUQzFrNG" iconName="message-circle" label="Discord" />
                        <LinkButton href="https://github.com/imcomingforyou6959-gif/rawr.xyz" iconName="github" label="GitHub" />
                        <LinkButton href="https://www.youtube.com/@rawr.xy3" iconName="youtube" label="YouTube" />
                    </div>

                    {/* CALLING SCRIPTBLOCK HERE */}
                    <ScriptBlock />
                </motion.div>

                <footer className="absolute bottom-8 z-20 text-[8px] font-mono text-white/10 tracking-[0.5em] uppercase text-center">
                    rawr.xyz © 2026 // ACCESS GRANTED
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
</html>
