<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
        }

        .discord-sidebar { background-color: #111111; }
        .discord-card { background-color: #181818; border: 1px solid #222; }
        .active-tab { color: #ff4444; border-left: 2px solid #ff4444; background: rgba(255, 68, 68, 0.05); }
        
        /* Classic terminal style for ScriptBlock */
        .script-block {
            background: #050505;
            border: 1px solid #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            color: #00ff00;
            font-size: 12px;
            min-height: 80px;
        }

        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // Fixed ScriptBlock logic - inside the HTML to ensure visibility
    const ScriptBlock = () => {
        const [lines, setLines] = useState(["> _"]);
        const messages = [
            "> Initializing rawr.xyz...",
            "> Loading B4NEX modules...",
            "> Connection established.",
            "> System: Optimal.",
            "> Awaiting input..."
        ];

        useEffect(() => {
            let i = 0;
            const interval = setInterval(() => {
                setLines(prev => [...prev.slice(-3), messages[i % messages.length]]);
                i++;
            }, 2000);
            return () => clearInterval(interval);
        }, []);

        return (
            <div className="script-block mt-4">
                {lines.map((l, idx) => <div key={idx}>{l}</div>)}
                <div className="text-white opacity-50 italic">System Status: Active <span className="cursor">|</span></div>
            </div>
        );
    };

    const App = () => {
        const [currentTab, setCurrentTab] = useState('About me');

        return (
            <div className="flex h-screen w-full">
                {/* Sidebar */}
                <div className="w-64 discord-sidebar flex flex-col p-4 border-r border-white/5">
                    <div className="text-red-500 font-bold text-xl mb-8 tracking-widest uppercase">rawr.xyz</div>
                    
                    <div className="flex flex-col gap-2">
                        {['About me', 'Settings', 'Script library'].map(tab => (
                            <div 
                                key={tab}
                                onClick={() => setCurrentTab(tab)}
                                className={`px-4 py-2 cursor-pointer transition-all ${currentTab === tab ? 'active-tab' : 'text-gray-500 hover:text-white'}`}
                            >
                                {tab}
                            </div>
                        ))}
                    </div>

                    <div className="mt-auto flex items-center gap-3 p-2 bg-black/40 rounded">
                        <img src="logo2.PNG" className="w-10 h-10 rounded shadow-lg" alt="PFP" />
                        <div>
                            <div className="text-xs font-bold text-white">Onlyonestands</div>
                            <div className="text-[10px] text-gray-500 uppercase">Online</div>
                        </div>
                    </div>
                </div>

                {/* Main Content */}
                <div className="flex-1 p-12 overflow-y-auto">
                    {currentTab === 'About me' && (
                        <div className="max-w-xl">
                            <h1 className="text-3xl font-bold mb-4">About Me</h1>
                            <p className="text-gray-400 mb-6 leading-relaxed">
                                Welcome back. This is the classic interface. Currently developing 
                                private tools and maintaining the rawr ecosystem.
                            </p>
                            <h2 className="text-red-500 text-sm font-bold uppercase mb-2">Terminal Output</h2>
                            <ScriptBlock />
                        </div>
                    )}

                    {currentTab === 'Settings' && (
                        <div className="max-w-xl">
                            <h1 className="text-3xl font-bold mb-4">Settings</h1>
                            <div className="discord-card p-6 rounded">
                                <div className="flex justify-between items-center mb-4">
                                    <span>Performance Mode</span>
                                    <div className="w-10 h-5 bg-red-600 rounded-full flex items-center justify-end px-1">
                                        <div className="w-3 h-3 bg-white rounded-full"></div>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center opacity-50">
                                    <span>Streamer Mode</span>
                                    <div className="w-10 h-5 bg-gray-700 rounded-full flex items-center px-1">
                                        <div className="w-3 h-3 bg-gray-400 rounded-full"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {currentTab === 'Script library' && (
                        <div className="max-w-xl">
                            <h1 className="text-3xl font-bold mb-6">Script Library</h1>
                            <div className="grid gap-4">
                                <div className="discord-card p-4 rounded hover:border-red-500/50 transition-colors cursor-pointer">
                                    <div className="text-red-500 font-bold">B4NEX Main.lua</div>
                                    <div className="text-xs text-gray-500">Last updated: 2 hours ago</div>
                                </div>
                                <div className="discord-card p-4 rounded hover:border-red-500/50 transition-colors cursor-pointer">
                                    <div className="text-red-500 font-bold">Anti-Detection.lua</div>
                                    <div className="text-xs text-gray-500">Last updated: 1 day ago</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
