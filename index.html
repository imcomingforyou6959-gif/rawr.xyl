<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>rawrs.zapto.org | Performance Scripting Hub</title>
    <meta name="description" content="The official repository for rawr.xyz. Safe. Fast. Reliable.">
    <meta name="theme-color" content="#ef4444">

    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#ef4444',
                        foreground: '#ffffff',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #050505;
            color: white;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        /* Rain Canvas */
        .rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.12;
        }
        
        /* Scanline Effect */
        .scanline {
            width: 100%;
            height: 3px;
            background: linear-gradient(to bottom, transparent, rgba(239, 68, 68, 0.08), transparent);
            position: fixed;
            z-index: 5;
            top: 0;
            animation: scan 6s linear infinite;
        }
        
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        
        /* Logo Glow */
        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(239, 68, 68, 0.3));
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ef4444;
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }
        
        /* Chat Message Animations */
        .chat-message-web {
            animation: slideInRight 0.3s ease-out;
        }
        
        .chat-message-discord {
            animation: slideInLeft 0.3s ease-out;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            width: fit-content;
        }
        
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        /* Notification Badge */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: black;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
        }
        
        /* Connection Status Dot */
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: statusPulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }
        
        .status-dot.disconnected {
            background: #ef4444;
        }
        
        @keyframes statusPulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        
        /* Input Focus */
        input:focus {
            outline: none;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // --- CONFIGURATION ---
    const CONFIG = {
        WEBSOCKET_URL: 'ws://localhost:8765',
        MESSAGE_HISTORY_SIZE: 100,
        AUTO_SCROLL_THRESHOLD: 100,
    };

    // --- WEBSOCKET MANAGER ---
    class WebSocketManager {
        constructor(onMessage) {
            this.ws = null;
            this.onMessage = onMessage;
            this.isConnected = false;
            this.reconnectAttempts = 0;
            this.maxReconnectAttempts = 5;
            this.reconnectDelay = 3000;
        }

        async connect() {
            try {
                this.ws = new WebSocket(CONFIG.WEBSOCKET_URL);
                
                this.ws.onopen = () => {
                    console.log('WebSocket connected');
                    this.isConnected = true;
                    this.reconnectAttempts = 0;
                };
                
                this.ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        this.onMessage(data);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };
                
                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.isConnected = false;
                };
                
                this.ws.onclose = () => {
                    console.log('WebSocket closed');
                    this.isConnected = false;
                    this.attemptReconnect();
                };
            } catch (error) {
                console.error('Failed to connect WebSocket:', error);
                this.isConnected = false;
                this.attemptReconnect();
            }
        }

        attemptReconnect() {
            if (this.reconnectAttempts < this.maxReconnectAttempts) {
                this.reconnectAttempts++;
                console.log(`Reconnecting... (${this.reconnectAttempts}/${this.maxReconnectAttempts})`);
                setTimeout(() => this.connect(), this.reconnectDelay * this.reconnectAttempts);
            } else {
                console.error('Max reconnection attempts reached');
            }
        }

        send(message) {
            if (this.isConnected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                try {
                    this.ws.send(JSON.stringify(message));
                    return true;
                } catch (error) {
                    console.error('Failed to send message:', error);
                    return false;
                }
            } else {
                console.warn('WebSocket not connected');
                return false;
            }
        }

        close() {
            if (this.ws) {
                this.ws.close();
            }
        }
    }

    // --- USER ID MANAGEMENT ---
    function getUserId() {
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'User_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chat_user_id', userId);
        }
        return userId;
    }

    // --- IMPROVED LIVE CHAT COMPONENT ---
    const LiveChat = () => {
        const [isOpen, setIsOpen] = React.useState(false);
        const [messages, setMessages] = React.useState([]);
        const [input, setInput] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);
        const [unreadCount, setUnreadCount] = React.useState(0);
        const [isConnected, setIsConnected] = React.useState(false);
        const [connectionStatus, setConnectionStatus] = React.useState('Connecting...');
        const [staffReplying, setStaffReplying] = React.useState(false);
        
        const scrollRef = React.useRef(null);
        const wsManagerRef = React.useRef(null);
        const currentUserRef = React.useRef(getUserId());

        // Initialize WebSocket
        React.useEffect(() => {
            wsManagerRef.current = new WebSocketManager((data) => {
                handleWebSocketMessage(data);
            });

            wsManagerRef.current.connect();

            return () => {
                if (wsManagerRef.current) {
                    wsManagerRef.current.close();
                }
            };
        }, []);

        // Handle incoming WebSocket messages
        const handleWebSocketMessage = (data) => {
            if (data.type === 'chat' && data.origin === 'web') {
                // Message from website
                addMessage({
                    user: data.user,
                    text: data.text,
                    timestamp: data.timestamp || Date.now(),
                    origin: 'web',
                    id: data.id
                });
            } else if (data.type === 'reply') {
                // Reply from Discord staff
                addMessage({
                    user: data.user,
                    text: data.text,
                    timestamp: data.timestamp || Date.now(),
                    origin: 'discord',
                    id: data.id
                });
                setStaffReplying(false);
            } else if (data.type === 'typing') {
                // Typing indicator from staff
                if (data.origin === 'discord') {
                    setStaffReplying(true);
                }
            }

            // Update connection status
            if (wsManagerRef.current?.isConnected) {
                setIsConnected(true);
                setConnectionStatus('Connected');
            }
        };

        // Add message to chat
        const addMessage = (msg) => {
            setMessages(prev => {
                // Prevent duplicate messages
                if (prev.some(m => m.id === msg.id)) {
                    return prev;
                }

                const newMessages = [...prev, msg].slice(-CONFIG.MESSAGE_HISTORY_SIZE);

                // Save to localStorage
                try {
                    localStorage.setItem('chat_messages', JSON.stringify(newMessages));
                } catch (e) {
                    console.warn('Failed to save messages to localStorage:', e);
                }

                // Update unread count if chat closed
                if (!isOpen && msg.origin === 'discord') {
                    setUnreadCount(count => count + 1);
                }

                return newMessages;
            });
        };

        // Load messages from localStorage
        React.useEffect(() => {
            try {
                const saved = localStorage.getItem('chat_messages');
                if (saved) {
                    setMessages(JSON.parse(saved));
                }
            } catch (e) {
                console.warn('Failed to load messages:', e);
            }
        }, []);

        // Auto-scroll to bottom
        React.useEffect(() => {
            if (scrollRef.current && isOpen) {
                scrollRef.current.scrollTo({
                    top: scrollRef.current.scrollHeight,
                    behavior: 'smooth'
                });
            }
        }, [messages, isOpen]);

        // Reset unread when opening
        React.useEffect(() => {
            if (isOpen) {
                setUnreadCount(0);
            }
        }, [isOpen]);

        // Monitor connection status
        React.useEffect(() => {
            const checkConnection = setInterval(() => {
                if (wsManagerRef.current?.isConnected) {
                    setIsConnected(true);
                    setConnectionStatus('Connected');
                } else {
                    setIsConnected(false);
                    setConnectionStatus('Disconnected');
                }
            }, 1000);

            return () => clearInterval(checkConnection);
        }, []);

        // Send message
        const sendMessage = async () => {
            if (!input.trim()) return;

            const messageText = input.trim();
            const messageId = `msg_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

            const message = {
                type: 'chat',
                user: currentUserRef.current,
                text: messageText,
                timestamp: Date.now(),
                origin: 'web',
                id: messageId
            };

            // Check connection before sending
            if (!wsManagerRef.current?.isConnected) {
                alert('Not connected to support. Please try again.');
                return;
            }

            setIsLoading(true);
            setInput("");

            // Add to local messages immediately for better UX
            addMessage(message);

            // Send via WebSocket
            const sent = wsManagerRef.current.send(message);

            if (!sent) {
                alert('Failed to send message. Please check your connection.');
                setInput(messageText);
                setMessages(prev => prev.filter(m => m.id !== messageId));
            }

            setIsLoading(false);
        };

        // Format timestamp
        const formatTime = (timestamp) => {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        };

        // Format date
        const formatDate = (timestamp) => {
            const date = new Date(timestamp);
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        };

        // Check if we should show date separator
        const shouldShowDateSeparator = (current, previous) => {
            if (!previous) return true;
            const currentDate = new Date(current.timestamp).toDateString();
            const previousDate = new Date(previous.timestamp).toDateString();
            return currentDate !== previousDate;
        };

        return (
            <div className="fixed bottom-0 right-8 z-[100] w-96 font-mono">
                <motion.div
                    animate={{ y: isOpen ? 0 : 400 }}
                    transition={{ type: "spring", damping: 25, stiffness: 160 }}
                    className="bg-[#0a0a0a] border border-white/10 rounded-t-2xl shadow-2xl overflow-hidden backdrop-blur-xl"
                >
                    {/* Chat Header */}
                    <div
                        onClick={() => setIsOpen(!isOpen)}
                        className="bg-primary p-4 cursor-pointer flex justify-between items-center relative"
                    >
                        <div className="flex items-center gap-2">
                            <div className={`status-dot ${isConnected ? 'connected' : 'disconnected'}`}></div>
                            <span className="text-[10px] font-black tracking-widest text-black uppercase">
                                {connectionStatus}
                            </span>
                        </div>
                        <div className="flex items-center gap-3">
                            <i className="fas fa-headset text-black text-xs"></i>
                            <motion.i
                                animate={{ rotate: isOpen ? 180 : 0 }}
                                className="fas fa-chevron-down text-black text-[10px]"
                            ></motion.i>
                        </div>
                        {unreadCount > 0 && !isOpen && (
                            <motion.div
                                initial={{ scale: 0 }}
                                animate={{ scale: 1 }}
                                className="notification-badge"
                            >
                                {unreadCount > 9 ? '9+' : unreadCount}
                            </motion.div>
                        )}
                    </div>

                    {/* Chat Body */}
                    <div className="h-[450px] flex flex-col bg-black/95">
                        {/* Messages Container */}
                        <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                            {messages.length === 0 ? (
                                <div className="text-center text-white/20 py-12 flex flex-col items-center justify-center h-full">
                                    <i className="fas fa-comments text-3xl mb-3 block"></i>
                                    <p className="text-[10px]">No messages yet</p>
                                    <p className="text-[9px] mt-1">Start a conversation with support</p>
                                </div>
                            ) : (
                                <>
                                    {messages.map((msg, i) => {
                                        const isWeb = msg.origin === 'web';
                                        const isCurrentUser = msg.user === currentUserRef.current;
                                        const previous = i > 0 ? messages[i - 1] : null;
                                        const showDate = shouldShowDateSeparator(msg, previous);

                                        return (
                                            <React.Fragment key={msg.id || i}>
                                                {showDate && (
                                                    <div className="flex items-center gap-3 my-2">
                                                        <div className="h-[1px] flex-1 bg-white/5"></div>
                                                        <span className="text-[8px] text-white/20">
                                                            {formatDate(msg.timestamp)}
                                                        </span>
                                                        <div className="h-[1px] flex-1 bg-white/5"></div>
                                                    </div>
                                                )}
                                                <motion.div
                                                    initial={{ opacity: 0, x: isWeb ? 20 : -20 }}
                                                    animate={{ opacity: 1, x: 0 }}
                                                    className={`${isWeb ? 'ml-auto text-right' : 'mr-auto text-left'} max-w-[80%]`}
                                                >
                                                    <div className="flex items-center gap-1 mb-1">
                                                        <span className="text-[8px] text-white/30 uppercase tracking-wider font-bold">
                                                            {isCurrentUser ? 'You' : (isWeb ? msg.user : `Staff: ${msg.user}`)}
                                                        </span>
                                                        <span className="text-[8px] text-white/20 ml-auto">
                                                            {formatTime(msg.timestamp)}
                                                        </span>
                                                    </div>
                                                    <div className={`
                                                        ${isWeb ? 'bg-primary/20 text-primary border-primary/40' : 'bg-white/10 text-white border-white/20'}
                                                        px-3 py-2 rounded-xl border text-[11px] leading-relaxed break-words shadow-lg
                                                    `}>
                                                        {msg.text}
                                                    </div>
                                                </motion.div>
                                            </React.Fragment>
                                        );
                                    })}

                                    {/* Typing Indicator */}
                                    {staffReplying && (
                                        <motion.div
                                            initial={{ opacity: 0 }}
                                            animate={{ opacity: 1 }}
                                            className="mr-auto"
                                        >
                                            <div className="typing-indicator">
                                                <span></span>
                                                <span></span>
                                                <span></span>
                                            </div>
                                        </motion.div>
                                    )}
                                </>
                            )}
                        </div>

                        {/* Input Area */}
                        <div className="border-t border-white/10 bg-black/50 p-3">
                            <div className="flex gap-2">
                                <input
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey && !isLoading) {
                                            e.preventDefault();
                                            sendMessage();
                                        }
                                    }}
                                    disabled={!isConnected || isLoading}
                                    type="text"
                                    placeholder={isConnected ? "Type a message..." : "Connecting..."}
                                    className="bg-white/5 border border-white/10 flex-1 px-3 py-2 text-[11px] focus:border-primary/50 rounded-lg text-white placeholder:text-white/20 disabled:opacity-50 disabled:cursor-not-allowed"
                                    maxLength="500"
                                />
                                <motion.button
                                    whileHover={{ scale: isConnected && !isLoading ? 1.05 : 1 }}
                                    whileTap={{ scale: isConnected && !isLoading ? 0.95 : 1 }}
                                    onClick={sendMessage}
                                    disabled={!input.trim() || !isConnected || isLoading}
                                    className="bg-primary/20 hover:bg-primary text-primary hover:text-black disabled:opacity-50 disabled:cursor-not-allowed w-10 h-10 rounded-lg transition-all flex items-center justify-center border border-primary/30 font-bold"
                                >
                                    {isLoading ? (
                                        <i className="fas fa-spinner text-[11px] animate-spin"></i>
                                    ) : (
                                        <i className="fas fa-paper-plane text-[11px]"></i>
                                    )}
                                </motion.button>
                            </div>
                            <div className="text-[8px] text-white/20 text-center mt-2">
                                <i className="fas fa-shield-alt text-[6px] mr-1"></i>
                                Encrypted • Staff reply within minutes
                            </div>
                        </div>
                    </div>
                </motion.div>
            </div>
        );
    };

    // --- COMPATIBILITY BAR ---
    const CompatibilityBar = () => {
        const executors = [
            { name: "Xeno", status: "verified" },
            { name: "Velocity", status: "verified" },
            { name: "Solara", status: "verified" },
            { name: "Wave", status: "beta" },
            { name: "Sirhurt", status: "verified" }
        ];

        return (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.8 }} className="mt-8 w-full max-w-lg px-4">
                <div className="flex items-center gap-4 mb-4">
                    <div className="h-[1px] flex-1 bg-white/5"></div>
                    <span className="text-[9px] font-mono text-white/20 tracking-[0.4em] uppercase font-bold">Verified compatibility</span>
                    <div className="h-[1px] flex-1 bg-white/5"></div>
                </div>
                <div className="flex flex-wrap justify-center gap-x-8 gap-y-4">
                    {executors.map(({ name, status }) => (
                        <div key={name} className="flex items-center gap-2 group cursor-default">
                            <div className={`w-1 h-1 rounded-full ${status === 'verified' ? 'bg-green-500' : 'bg-yellow-500'} group-hover:bg-primary transition-all duration-300`}></div>
                            <span className="text-[10px] font-mono font-black text-white/30 group-hover:text-white transition-colors tracking-tighter uppercase">{name}</span>
                            {status === 'beta' && (
                                <span className="text-[6px] bg-yellow-500/20 text-yellow-500 px-1 rounded">BETA</span>
                            )}
                        </div>
                    ))}
                </div>
            </motion.div>
        );
    };

    // --- SCRIPT BLOCK ---
    function ScriptBlock() {
        const [copied, setCopied] = React.useState(false);
        const [config, setConfig] = React.useState({
            version: "v2.0.0",
            status: "ONLINE",
            statusColor: "green",
            changelog: "Improved stability and performance"
        });

        const scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyz/refs/heads/main/.exe"))()`;

        React.useEffect(() => {
            const fetchStatus = async () => {
                try {
                    const jsonUrl = `https://raw.githubusercontent.com/imcomingforyou6959-gif/rawr.xyz/main/status.json?t=${Date.now()}`;
                    const response = await fetch(jsonUrl);
                    if (response.ok) {
                        const data = await response.json();
                        setConfig(data);
                    }
                } catch (error) {
                    console.log('Using default config');
                }
            };

            fetchStatus();
            const interval = setInterval(fetchStatus, 30000);
            return () => clearInterval(interval);
        }, []);

        const handleCopy = async () => {
            try {
                await navigator.clipboard.writeText(scriptText);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard');
            }
        };

        return (
            <div className="flex flex-col items-center w-full">
                <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    className="relative w-full max-w-lg bg-black/40 border border-white/10 rounded-2xl overflow-hidden backdrop-blur-md mt-12 shadow-2xl"
                >
                    <div className="flex items-center justify-between px-5 py-4 bg-white/5 border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-code text-primary/50 text-xs"></i>
                            <span className="text-[10px] font-mono text-white/30 uppercase tracking-widest">{config.version}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${config.statusColor === 'green' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                            <span className="text-[9px] font-bold text-white/40 uppercase">{config.status}</span>
                        </div>
                    </div>

                    <div className="p-6">
                        <div className="bg-black/60 rounded-xl p-4 mb-4 border border-white/5 overflow-x-auto">
                            <code className="text-primary text-[11px] font-mono break-all select-all">
                                {scriptText}
                            </code>
                        </div>

                        <motion.button
                            whileHover={{ scale: 1.02 }}
                            whileTap={{ scale: 0.98 }}
                            onClick={handleCopy}
                            className="w-full py-4 bg-primary/10 hover:bg-primary text-primary hover:text-black border border-primary/20 rounded-xl font-black text-[10px] tracking-widest transition-all uppercase flex items-center justify-center gap-2"
                        >
                            <i className={`fas ${copied ? 'fa-check' : 'fa-copy'} text-[10px]`}></i>
                            {copied ? "Copied Successfully" : "Copy Official Script"}
                        </motion.button>

                        {config.changelog && (
                            <div className="mt-3 text-center">
                                <span className="text-[8px] text-white/20">
                                    <i className="fas fa-info-circle mr-1"></i> {config.changelog}
                                </span>
                            </div>
                        )}
                    </div>
                </motion.div>
                <CompatibilityBar />
            </div>
        );
    }

    // --- RAIN BACKGROUND ---
    const RainBackground = () => {
        const canvasRef = React.useRef(null);
        const animationRef = React.useRef(null);

        React.useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let drops = [];
            let width = window.innerWidth;
            let height = window.innerHeight;

            const init = () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;

                const dropCount = Math.min(80, Math.floor(width / 30));
                drops = Array.from({ length: dropCount }, () => ({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    len: Math.random() * 20 + 10,
                    vel: Math.random() * 8 + 4
                }));
            };

            const draw = () => {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.3;

                drops.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + d.len);
                    ctx.stroke();

                    d.y += d.vel;
                    if (d.y > height) {
                        d.y = -20;
                        d.x = Math.random() * width;
                    }
                });

                animationRef.current = requestAnimationFrame(draw);
            };

            init();
            draw();

            const handleResize = () => {
                init();
            };

            window.addEventListener('resize', handleResize);
            return () => {
                window.removeEventListener('resize', handleResize);
                if (animationRef.current) {
                    cancelAnimationFrame(animationRef.current);
                }
            };
        }, []);

        return <canvas ref={canvasRef} className="rain-canvas" />;
    };

    // --- LINK BUTTON ---
    const LinkButton = ({ href, icon, label, external = true }) => (
        <motion.a
            whileHover={{ scale: 1.05 }}
            whileTap={{ scale: 0.95 }}
            href={href}
            target={external ? "_blank" : "_self"}
            rel={external ? "noopener noreferrer" : ""}
            className="flex items-center gap-4 px-8 py-4 bg-white/[0.02] border border-white/5 rounded-2xl hover:bg-white/[0.06] hover:border-primary/40 transition-all group backdrop-blur-sm"
        >
            <i className={`${icon} text-white/30 group-hover:text-primary transition-colors text-xl`}></i>
            <span className="font-bold text-[13px] tracking-tight text-white/60 group-hover:text-white transition-colors">{label}</span>
        </motion.a>
    );

    // --- MAIN HOME COMPONENT ---
    function Home() {
        const [showNotification, setShowNotification] = React.useState(true);

        React.useEffect(() => {
            const timer = setTimeout(() => setShowNotification(false), 5000);
            return () => clearTimeout(timer);
        }, []);

        return (
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-background px-6 overflow-hidden py-20">
                <RainBackground />
                <div className="scanline" />
                <div className="fixed inset-0 bg-gradient-to-tr from-background via-transparent to-primary/5 z-10 pointer-events-none" />

                {/* Welcome Notification */}
                <AnimatePresence>
                    {showNotification && (
                        <motion.div
                            initial={{ opacity: 0, y: -50 }}
                            animate={{ opacity: 1, y: 0 }}
                            exit={{ opacity: 0, y: -50 }}
                            className="fixed top-20 left-1/2 transform -translate-x-1/2 z-30 bg-primary/20 backdrop-blur-md border border-primary/30 rounded-xl px-4 py-2 text-xs font-mono"
                        >
                            <i className="fas fa-shield-alt mr-2 text-primary"></i>
                            Secure connection established
                        </motion.div>
                    )}
                </AnimatePresence>

                <motion.div
                    initial={{ opacity: 0, scale: 0.95 }}
                    animate={{ opacity: 1, scale: 1 }}
                    transition={{ duration: 0.8 }}
                    className="relative z-20 flex flex-col items-center w-full max-w-2xl"
                >
                    <motion.img
                        src="logo.png"
                        animate={{ y: [0, -10, 0] }}
                        transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }}
                        className="w-40 h-40 md:w-48 md:h-48 object-contain mb-12 logo-glow"
                        alt="logo"
                        onError={(e) => {
                            e.target.src = "https://via.placeholder.com/192x192?text=RAWr";
                        }}
                    />

                    <div className="text-center mb-14">
                        <h1 className="text-6xl md:text-8xl font-black font-mono text-white italic tracking-tighter uppercase">
                            rawr<span className="text-primary">.xyz</span>
                        </h1>
                        <p className="text-white/20 font-mono text-[10px] tracking-[0.6em] mt-4 uppercase">
                            elite performance execution
                        </p>
                    </div>

                    <div className="flex flex-wrap justify-center gap-4">
                        <LinkButton
                            href="https://discord.gg/eMpUQzFrNG"
                            icon="fa-brands fa-discord"
                            label="Community"
                        />
                        <LinkButton
                            href="https://github.com/imcomingforyou6959-gif/rawr.xyz"
                            icon="fa-brands fa-github"
                            label="Repository"
                        />
                        <LinkButton
                            href="https://www.youtube.com/@rawr.xy3"
                            icon="fa-brands fa-youtube"
                            label="Showcase"
                        />
                    </div>

                    <ScriptBlock />
                </motion.div>

                <footer className="mt-20 z-20 text-[10px] font-mono text-white/10 tracking-[0.8em] uppercase text-center select-none">
                    rawr.xyz // Secure Access // v2.0
                </footer>

                <LiveChat />
            </div>
        );
    }

    // Render app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Home />);
</script>
</body>
