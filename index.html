<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rawr.xyz | v1.5.0</title>
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#070707',
                        primary: '#ef4444', 
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #070707;
            margin: 0;
            overflow-x: hidden;
            color: white;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Slider Styling */
        input[type='range'] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.05);
            height: 4px;
            border-radius: 5px;
            accent-color: #ef4444;
        }

        #root { position: relative; z-index: 10; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="RainBackground.jsx?v=2.0"></script>
    <script type="text/babel" src="ScriptBlock.jsx?v=2.0"></script>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;

        function Home() {
            const [page, setPage] = React.useState('executor'); // 'executor' or 'owner'
            const [rainSpeed, setRainSpeed] = React.useState(1);
            const [spotify, setSpotify] = React.useState(null);
            const myDiscordID = "1071330258172780594";

            // Fetch Spotify Status via Lanyard API
            React.useEffect(() => {
                const fetchStatus = () => {
                    fetch(`https://api.lanyard.rest/v1/users/${myDiscordID}`)
                        .then(res => res.json())
                        .then(res => {
                            if (res.data.listening_to_spotify) {
                                setSpotify(res.data.spotify);
                            } else {
                                setSpotify(null);
                            }
                        })
                        .catch(() => setSpotify(null));
                };

                fetchStatus();
                const interval = setInterval(fetchStatus, 5000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="relative min-h-screen flex flex-col items-center">
                    <RainBackground speed={rainSpeed} />
                    
                    {/* Fixed Navigation Menu */}
                    <nav className="fixed top-8 z-50 bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl p-1.5 flex gap-1 shadow-2xl">
                        <button 
                            onClick={() => setPage('executor')}
                            className={`px-8 py-2.5 rounded-xl text-[10px] font-mono tracking-[0.3em] transition-all duration-300 ${page === 'executor' ? 'bg-primary text-white shadow-[0_0_20px_rgba(239,68,68,0.3)]' : 'text-white/30 hover:text-white'}`}
                        >
                            EXECUTOR
                        </button>
                        <button 
                            onClick={() => setPage('owner')}
                            className={`px-8 py-2.5 rounded-xl text-[10px] font-mono tracking-[0.3em] transition-all duration-300 ${page === 'owner' ? 'bg-primary text-white shadow-[0_0_20px_rgba(239,68,68,0.3)]' : 'text-white/30 hover:text-white'}`}
                        >
                            OWNER
                        </button>
                    </nav>

                    <main className="relative z-10 flex flex-col items-center w-full px-6 pt-36 pb-20 max-w-4xl">
                        <AnimatePresence mode="wait">
                            {page === 'executor' ? (
                                <motion.div 
                                    key="exec"
                                    initial={{ opacity: 0, scale: 0.95 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.95 }}
                                    className="flex flex-col items-center gap-12 w-full"
                                >
                                    <div className="flex flex-col items-center gap-6">
                                        <motion.img src="logo.png" className="w-32 h-32 md:w-48 md:h-48 object-contain drop-shadow-[0_0_30px_rgba(239,68,68,0.2)]" animate={{ y: [0, -10, 0] }} transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }} />
                                        <h1 className="text-5xl md:text-7xl font-bold font-mono tracking-tighter uppercase">rawr<span className="text-primary">.xyz</span></h1>
                                    </div>

                                    <ScriptBlock />

                                    {/* Rain Settings Slider */}
                                    <div className="w-full max-w-lg bg-black/40 border border-white/10 p-6 rounded-2xl backdrop-blur-md">
                                        <div className="flex items-center justify-between mb-4">
                                            <span className="text-[10px] font-mono text-white/40 uppercase tracking-widest flex items-center gap-2">
                                                <div className="w-1 h-3 bg-primary rounded-full"></div>
                                                Engine Settings
                                            </span>
                                            <span className="text-[10px] font-mono text-primary font-bold">Rain: {rainSpeed === 0 ? "OFF" : rainSpeed + "x"}</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max="3" 
                                            step="0.5" 
                                            value={rainSpeed} 
                                            onChange={(e) => setRainSpeed(parseFloat(e.target.value))} 
                                            className="w-full cursor-pointer"
                                        />
                                    </div>
                                </motion.div>
                            ) : (
                                <motion.div 
                                    key="owner"
                                    initial={{ opacity: 0, scale: 0.95 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.95 }}
                                    className="flex flex-col items-center gap-8 w-full max-w-lg"
                                >
                                    <div className="text-center mb-4">
                                        <h2 className="text-4xl font-mono font-bold uppercase tracking-widest text-primary mb-2">The Creator</h2>
                                        <p className="text-white/30 text-[10px] font-mono tracking-[0.4em] uppercase">Security Clearance: Level 5</p>
                                    </div>

                                    {/* Live Spotify Widget */}
                                    <div className="w-full bg-[#1DB954]/5 border border-[#1DB954]/20 p-6 rounded-3xl backdrop-blur-xl transition-all duration-500 hover:bg-[#1DB954]/10">
                                        {spotify ? (
                                            <div className="flex items-center gap-6">
                                                <div className="relative">
                                                    <img src={spotify.album_art_url} className="w-24 h-24 rounded-2xl shadow-2xl relative z-10" />
                                                    <div className="absolute inset-0 bg-[#1DB954] blur-2xl opacity-20 animate-pulse"></div>
                                                </div>
                                                <div className="flex-1 overflow-hidden">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className="w-2 h-2 bg-[#1DB954] rounded-full animate-ping"></span>
                                                        <span className="text-[10px] font-mono text-[#1DB954] uppercase tracking-widest font-bold">Currently Listening</span>
                                                    </div>
                                                    <h3 className="text-white font-bold text-lg truncate leading-tight">{spotify.track}</h3>
                                                    <p className="text-white/50 text-sm truncate uppercase tracking-tighter">by {spotify.artist}</p>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="py-6 text-center">
                                                <p className="text-white/20 font-mono text-[10px] uppercase tracking-[0.3em] italic">Spotify session currently inactive</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Admin Information Cards */}
                                    <div className="w-full space-y-3">
                                        <div className="bg-white/5 border border-white/10 p-5 rounded-2xl flex items-center justify-between group hover:border-primary/50 transition-all cursor-default">
                                            <span className="text-[10px] font-mono text-white/40 uppercase tracking-widest">Discord</span>
                                            <span className="text-sm font-mono text-primary font-bold">Onlyonestands</span>
                                        </div>
                                        <a href="mailto:rawr.xyl@gmail.com" className="bg-white/5 border border-white/10 p-5 rounded-2xl flex items-center justify-between group hover:border-primary/50 transition-all">
                                            <span className="text-[10px] font-mono text-white/40 uppercase tracking-widest group-hover:text-white transition-colors">Email</span>
                                            <span className="text-sm font-mono text-primary group-hover:underline transition-all">rawr.xyl@gmail.com</span>
                                        </a>
                                        <a href="https://github.com/imcomingforyou6959-gif" target="_blank" className="bg-white/5 border border-white/10 p-5 rounded-2xl flex items-center justify-between group hover:border-primary/50 transition-all">
                                            <span className="text-[10px] font-mono text-white/40 uppercase tracking-widest group-hover:text-white transition-colors">Github</span>
                                            <span className="text-sm font-mono text-primary group-hover:underline transition-all truncate ml-4">imcomingforyou6959-gif</span>
                                        </a>
                                    </div>

                                    <footer className="mt-12 text-[8px] font-mono text-white/10 uppercase tracking-[0.8em]">rawr.xyz protocol</footer>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Home />);
    </script>
</body>
</html>
